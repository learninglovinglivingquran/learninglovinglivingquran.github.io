<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bayyinah Dream — Arabic of the Quran · Chapters 9–11</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#1A2744;--navy2:#22304A;
      --gold:#C9933B;--gold2:#E8AD55;
      --cream:#F5F0E8;--lgray:#E8E4DC;
      --teal:#1D7A8C;--teal2:#258EA3;
      --white:#fff;--dgray:#2D2D2D;--mgray:#5A5A6A;
      --green:#2E7D52;--purple:#6B3FA0;--red:#B94040;--orange:#C06020;
    }
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dgray);min-height:100vh}
    .ar{font-family:'Noto Naskh Arabic',serif;direction:rtl}
    #progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--teal));z-index:1000;transition:width .2s ease}
    nav{position:fixed;top:0;left:0;right:0;background:rgba(26,39,68,.97);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid rgba(201,147,59,.25)}
    .nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:58px}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--gold);text-decoration:none}
    .nav-logo span{color:#fff}
    .nav-chapters{display:flex;gap:.15rem;align-items:center;overflow-x:auto;max-width:80%}
    .nav-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.72rem;color:rgba(255,255,255,.5);padding:.3rem .6rem;border-radius:4px;transition:all .2s;white-space:nowrap}
    .nav-btn:hover{color:var(--gold);background:rgba(201,147,59,.1)}
    .nav-btn.active{color:var(--gold);background:rgba(201,147,59,.18)}
    .nav-counter{font-size:.7rem;color:rgba(255,255,255,.3);border-left:1px solid rgba(255,255,255,.1);padding-left:.9rem;margin-left:.4rem;white-space:nowrap}
    .slides-wrapper{padding-top:58px}
    .slide{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:5rem 2rem 4rem;position:relative;overflow:hidden}
    .slide-inner{max-width:1000px;margin:0 auto;width:100%;position:relative;z-index:2}
    .slide-dark{background:var(--navy);color:#fff}
    .slide-dark::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(29,122,140,.18) 0%,transparent 60%),radial-gradient(ellipse at 10% 80%,rgba(201,147,59,.1) 0%,transparent 50%);pointer-events:none}
    .slide-light{background:var(--cream);color:var(--dgray)}
    .slide-light::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 90% 10%,rgba(29,122,140,.07) 0%,transparent 55%);pointer-events:none}
    .gold-bar{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--teal),var(--gold))}
    .tag{display:inline-block;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.3rem .85rem;border-radius:4px;margin-bottom:1.2rem}
    .tag-gold{background:var(--gold);color:var(--navy)}
    .tag-teal{background:var(--teal);color:#fff}
    .tag-green{background:var(--green);color:#fff}
    .tag-red{background:var(--red);color:#fff}
    .tag-purple{background:var(--purple);color:#fff}
    .tag-orange{background:var(--orange);color:#fff}
    .slide-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,5vw,3rem);font-weight:700;line-height:1.15;margin-bottom:1.8rem}
    .slide-dark .slide-title{color:#fff}
    .slide-light .slide-title{color:var(--navy)}
    .hero-bismillah{font-family:'Noto Naskh Arabic',serif;font-size:clamp(1.4rem,4vw,2rem);color:var(--gold);text-align:center;margin-bottom:1.5rem;direction:rtl;animation:fadeUp .8s ease both}
    .hero-eyebrow{text-align:center;letter-spacing:.2em;font-size:.8rem;font-weight:600;color:var(--teal);text-transform:uppercase;margin-bottom:.75rem;animation:fadeUp .8s .1s ease both}
    .hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,8vw,5.5rem);font-weight:700;line-height:1.05;color:#fff;text-align:center;margin-bottom:1rem;animation:fadeUp .8s .2s ease both}
    .hero-sub{text-align:center;color:rgba(255,255,255,.6);font-size:1.05rem;margin-bottom:.5rem;animation:fadeUp .8s .3s ease both}
    .hero-divider{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.5rem auto;animation:fadeUp .8s .4s ease both}
    .hero-tagline{text-align:center;color:var(--gold);font-style:italic;font-size:.9rem;animation:fadeUp .8s .5s ease both}
    .hero-credit{text-align:center;color:rgba(255,255,255,.3);font-size:.8rem;margin-top:2.5rem;animation:fadeUp .8s .6s ease both}
    .h-dark{background:var(--navy);color:#fff;border-radius:8px;padding:1rem 1.3rem;font-size:.95rem;font-weight:600;margin-bottom:1.3rem}
    .h-gold{background:var(--gold);color:var(--navy);border-radius:8px;padding:1rem 1.3rem;font-size:.95rem;font-weight:600;margin-bottom:1.3rem}
    .h-teal{background:var(--teal);color:#fff;border-radius:8px;padding:1rem 1.3rem;font-size:.95rem;font-weight:600;margin-bottom:1.3rem}
    .note{background:var(--lgray);border-radius:8px;padding:.9rem 1.2rem;font-size:.87rem;color:var(--navy);margin-top:1.2rem}
    .note strong{color:var(--gold)}
    .note-dark{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
    @media(max-width:680px){.two-col{grid-template-columns:1fr}}
    .three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
    @media(max-width:700px){.three-col{grid-template-columns:1fr}}
    .card{background:#fff;border:1px solid var(--lgray);border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05)}
    .card-h{padding:.85rem 1.2rem;color:#fff;font-weight:700;font-size:.82rem;letter-spacing:.04em}
    .card-b{padding:1rem 1.2rem}
    .dt{width:100%;border-collapse:collapse;margin-top:.5rem}
    .dt th{background:var(--navy);color:#fff;font-size:.77rem;font-weight:600;padding:.6rem .9rem;text-align:left}
    .dt td{padding:.55rem .9rem;font-size:.87rem;border-bottom:1px solid var(--lgray)}
    .dt tr:nth-child(even) td{background:rgba(232,228,220,.4)}
    .dt tr:last-child td{border-bottom:none}
    .dt-ar{font-family:'Noto Naskh Arabic',serif;font-size:1.1rem;font-weight:600;color:var(--gold);text-align:center}
    .dkdt{width:100%;border-collapse:collapse;border-radius:8px;overflow:hidden}
    .dkdt th{background:var(--gold);color:var(--navy);font-size:.77rem;font-weight:700;padding:.65rem 1rem;text-align:left}
    .dkdt td{padding:.65rem 1rem;font-size:.87rem;border-bottom:1px solid rgba(255,255,255,.06);color:#fff}
    .dkdt tr:nth-child(even) td{background:rgba(255,255,255,.04)}
    .dkdt tr:last-child td{border-bottom:none}
    .dkdt .dt-ar{color:var(--gold2)}
    .ex{background:#fff;border:1px solid var(--lgray);border-radius:10px;padding:1rem 1.3rem;margin-bottom:.8rem}
    .ex-ar{font-family:'Noto Naskh Arabic',serif;font-size:1.35rem;font-weight:700;color:var(--navy);direction:rtl;margin-bottom:.35rem}
    .ex-en{font-size:.88rem;color:var(--mgray);font-style:italic}
    .ex-note{font-size:.79rem;color:var(--teal);margin-top:.3rem;font-weight:600}
    .step{display:flex;gap:1rem;align-items:flex-start;padding:.8rem 1.1rem;background:#fff;border:1px solid var(--lgray);border-radius:8px;margin-bottom:.6rem;font-size:.88rem}
    .step-n{background:var(--teal);color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
    .cat-row{display:flex;gap:1rem;align-items:flex-start;background:#fff;border:1px solid var(--lgray);border-radius:8px;padding:.85rem 1.1rem;margin-bottom:.6rem}
    .cat-n{background:var(--gold);color:var(--navy);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;margin-top:1px}
    .cat-title{font-weight:700;font-size:.87rem;color:var(--navy);margin-bottom:.2rem}
    .cat-desc{font-size:.84rem;color:var(--mgray);line-height:1.55}
    .cat-ex{font-family:'Noto Naskh Arabic',serif;font-size:.95rem;color:var(--gold);direction:rtl;margin-top:.25rem}
    .recap-row{display:flex;gap:1rem;align-items:flex-start;background:rgba(255,255,255,.07);border:1px solid rgba(201,147,59,.25);border-radius:8px;padding:.95rem 1.2rem;margin-bottom:.8rem}
    .recap-lbl{font-size:.74rem;font-weight:700;color:var(--gold);white-space:nowrap;padding-top:.1rem;min-width:120px}
    .recap-txt{font-size:.9rem;color:rgba(255,255,255,.85);line-height:1.55}
    .divider-ch{font-size:.78rem;font-weight:700;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.5rem;text-align:center}
    .divider-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,7vw,4.5rem);font-weight:700;color:#fff;margin-bottom:.4rem;text-align:center}
    .divider-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.9rem);color:rgba(255,255,255,.55);margin-bottom:1.5rem;text-align:center}
    .divider-hr{width:80px;height:1.5px;background:var(--gold);margin:0 auto 1.2rem}
    .divider-p{font-size:.95rem;color:rgba(255,255,255,.5);font-style:italic;margin-bottom:2rem;text-align:center}
    /* Negation matrix */
    .neg-matrix{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin:1rem 0}
    @media(max-width:650px){.neg-matrix{grid-template-columns:repeat(2,1fr)}}
    .neg-cell{border-radius:8px;padding:.7rem .8rem;text-align:center}
    .neg-cell-ar{font-family:'Noto Naskh Arabic',serif;font-size:1.1rem;font-weight:700;direction:rtl}
    .neg-cell-en{font-size:.72rem;margin-top:.2rem}
    /* Sentence structure */
    .sent-box{background:var(--navy);border-radius:10px;padding:1.2rem;display:flex;gap:.8rem;align-items:stretch;flex-wrap:wrap;margin:1rem 0}
    .sent-part{flex:1;min-width:130px;background:rgba(255,255,255,.07);border:1px solid rgba(201,147,59,.3);border-radius:8px;padding:.9rem 1rem;text-align:center}
    .sent-lbl{font-size:.7rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem}
    .sent-ar{font-family:'Noto Naskh Arabic',serif;font-size:1.05rem;color:#fff;direction:rtl}
    .sent-en{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:.2rem}
    /* Harf chip */
    .harf-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin:1rem 0}
    @media(max-width:500px){.harf-grid{grid-template-columns:repeat(2,1fr)}}
    .hchip{background:#fff;border:1px solid var(--gold);border-radius:8px;padding:.55rem .7rem;text-align:center}
    .hchip-ar{font-family:'Noto Naskh Arabic',serif;font-size:1.1rem;font-weight:700;color:var(--gold);direction:rtl}
    .hchip-en{font-size:.72rem;color:var(--mgray);margin-top:.1rem}
    /* Kan box */
    .kan-row{display:flex;gap:1rem;background:rgba(255,255,255,.07);border:1px solid rgba(201,147,59,.25);border-radius:8px;padding:.9rem 1.1rem;margin-bottom:.7rem;align-items:center}
    .kan-ar{font-family:'Noto Naskh Arabic',serif;font-size:1.2rem;font-weight:700;color:var(--gold);direction:rtl;min-width:120px}
    .kan-en{font-size:.88rem;color:rgba(255,255,255,.8)}
    /* comparison */
    .cmp-tbl{width:100%;border-collapse:collapse;border-radius:8px;overflow:hidden}
    .cmp-tbl th{background:var(--gold);color:var(--navy);padding:.6rem .9rem;font-size:.79rem;font-weight:700;text-align:left}
    .cmp-tbl td{padding:.55rem .9rem;font-size:.85rem;border-bottom:1px solid var(--lgray);vertical-align:top}
    .cmp-tbl tr:nth-child(even) td{background:rgba(232,228,220,.4)}
    .cmp-tbl tr:last-child td{border-bottom:none}
    /* Compound اسم flow */
    .comp-flow{background:rgba(255,255,255,.07);border:1px solid rgba(201,147,59,.25);border-radius:8px;padding:1rem 1.2rem;margin-bottom:.8rem}
    .comp-flow-top{display:flex;gap:.8rem;align-items:center;margin-bottom:.5rem;flex-wrap:wrap}
    .comp-badge{background:var(--gold);color:var(--navy);font-size:.75rem;font-weight:700;padding:.25rem .7rem;border-radius:4px}
    .comp-ar{font-family:'Noto Naskh Arabic',serif;font-size:1.1rem;font-weight:700;color:var(--gold2);direction:rtl}
    .comp-en{font-size:.84rem;color:rgba(255,255,255,.75);font-style:italic}
    .comp-note{font-size:.79rem;color:var(--teal2);margin-top:.3rem}
    /* atf cards */
    .atf-card{background:#fff;border:1px solid var(--lgray);border-radius:10px;padding:1rem 1.2rem;margin-bottom:.8rem;border-left:4px solid var(--gold)}
    .atf-ar{font-family:'Noto Naskh Arabic',serif;font-size:1.5rem;font-weight:700;color:var(--gold);direction:rtl;margin-bottom:.2rem}
    .atf-en-meaning{font-weight:600;font-size:.85rem;color:var(--navy);margin-bottom:.5rem}
    .atf-ex-ar{font-family:'Noto Naskh Arabic',serif;font-size:1rem;color:var(--dgray);direction:rtl;line-height:1.7;margin-bottom:.2rem}
    .atf-ex-en{font-size:.8rem;color:var(--mgray);font-style:italic}
    footer{background:var(--navy);color:rgba(255,255,255,.35);text-align:center;padding:1.8rem;font-size:.78rem;border-top:1px solid rgba(201,147,59,.2)}
    footer a{color:var(--gold);text-decoration:none}
    .scroll-top{position:fixed;bottom:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;background:var(--gold);color:var(--navy);border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.2);transition:opacity .3s,transform .2s;z-index:99}
    .scroll-top:hover{transform:translateY(-2px)}
    .agenda-card{display:flex;align-items:center;gap:1.2rem;background:#fff;border:1px solid var(--lgray);border-radius:10px;padding:1rem 1.4rem;margin-bottom:.9rem;box-shadow:0 2px 12px rgba(0,0,0,.05);transition:transform .2s}
    .agenda-card:hover{transform:translateX(4px)}
    .agenda-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;color:#fff;flex-shrink:0}
    .agenda-lbl{font-weight:600;font-size:.85rem;margin-bottom:.15rem}
    .agenda-desc{font-size:.88rem;color:var(--mgray)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .fi{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
    .fi.visible{opacity:1;transform:translateY(0)}
    @media(max-width:768px){.nav-chapters{display:none}.slide{padding:4.5rem 1.2rem 3rem}}
  </style>
</head>
<body>
<div id="progress-bar"></div>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const NAV = [
  {label:"Intro",        id:"s-intro"},
  {label:"Ch 9",         id:"s-ch9"},
  {label:"نفي الفعلية", id:"s-neg-fil"},
  {label:"نفي الاسمية", id:"s-neg-ism"},
  {label:"ليس Chart",   id:"s-lays"},
  {label:"لا للجنس",    id:"s-la-jins"},
  {label:"ما/إن + إلا", id:"s-illa"},
  {label:"من الزائدة",  id:"s-min-z"},
  {label:"Ch 10",        id:"s-ch10"},
  {label:"الناقصة Intro",id:"s-naqisa-intro"},
  {label:"Sent. Structure",id:"s-naqisa-str"},
  {label:"كان Charts",  id:"s-kan-charts"},
  {label:"الخبر منصوب", id:"s-khabar"},
  {label:"Abnormal",     id:"s-naqisa-abn"},
  {label:"Complex",      id:"s-naqisa-cplx"},
  {label:"Translating",  id:"s-naqisa-trans"},
  {label:"Negating كان", id:"s-naqisa-neg"},
  {label:"Templates",    id:"s-kan-tmpl"},
  {label:"Ch 11",        id:"s-ch11"},
  {label:"أن المصدرية", id:"s-an-masd"},
  {label:"أنّ",          id:"s-anna"},
  {label:"إذ و إذا",   id:"s-idh"},
  {label:"يوم",          id:"s-yawm"},
  {label:"حرف Ref Sheet",id:"s-harf-ref"},
  {label:"حروف العطف",  id:"s-atf"},
  {label:"Final Recap",  id:"s-final"},
];

function useScrollProgress(){
  const [p,setP]=useState(0);
  useEffect(()=>{
    const fn=()=>{const el=document.documentElement;const s=el.scrollTop||document.body.scrollTop;const t=el.scrollHeight-el.clientHeight;setP(t>0?(s/t)*100:0)};
    window.addEventListener("scroll",fn,{passive:true});return()=>window.removeEventListener("scroll",fn);
  },[]);return p;
}
function useActiveSection(ids){
  const [active,setActive]=useState(ids[0]);
  useEffect(()=>{
    const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id);}),{threshold:.35});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});return()=>obs.disconnect();
  },[ids]);return active;
}
function useFadeIn(){
  useEffect(()=>{
    const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("visible");}),{threshold:.12});
    document.querySelectorAll(".fi").forEach(el=>obs.observe(el));return()=>obs.disconnect();
  },[]);
}
function useShowTop(){
  const [show,setShow]=useState(false);
  useEffect(()=>{const fn=()=>setShow(window.scrollY>400);window.addEventListener("scroll",fn,{passive:true});return()=>window.removeEventListener("scroll",fn);},[]);
  return show;
}

const Tag=({children,color="gold"})=><span className={`tag tag-${color}`}>{children}</span>;
const Title=({children})=><h2 className="slide-title">{children}</h2>;
function Slide({id,dark,children}){
  return(
    <section className={dark?"slide slide-dark":"slide slide-light"} id={id}>
      {!dark&&<div className="gold-bar"/>}
      <div className="slide-inner">{children}</div>
    </section>
  );
}

function App(){
  const ids=NAV.map(n=>n.id);
  const progress=useScrollProgress();
  const active=useActiveSection(ids);
  const showTop=useShowTop();
  useFadeIn();

  return(<>
    <div id="progress-bar" style={{width:`${progress}%`}}/>
    <nav>
      <div className="nav-inner">
        <a className="nav-logo" href="#">Bayyinah <span>Dream</span></a>
        <div className="nav-chapters">
          {NAV.map(n=>(
            <button key={n.id} className={`nav-btn${active===n.id?" active":""}`}
              onClick={()=>document.getElementById(n.id)?.scrollIntoView({behavior:"smooth"})}>
              {n.label}
            </button>
          ))}
        </div>
        <div className="nav-counter">{NAV.findIndex(n=>n.id===active)+1} / {NAV.length}</div>
      </div>
    </nav>
    <div className="slides-wrapper">

    {/* HERO */}
    <Slide id="s-intro" dark>
      <div className="hero-bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
      <div className="hero-eyebrow">Bayyinah Dream · Nahw · Section 1</div>
      <h1 className="hero-title">النفي · الناقصة<br/>الجملة المركبة</h1>
      <p className="hero-sub">Chapters 9 · 10 · 11</p>
      <div className="hero-divider"/>
      <p className="hero-tagline">Negation · كان and Sisters · The Compound اسم · The حرف Reference Sheet</p>
      <div className="hero-credit">Based on the Dream Textbook · Sumaya Al-Saadoon</div>
    </Slide>

    {/* AGENDA */}
    <Slide id="s-agenda">
      <div className="fi"><Tag>Overview</Tag></div>
      <div className="fi"><Title>Three Final Chapters of Section 1</Title></div>
      {[
        {num:9,color:"var(--red)",   label:"Chapter 9 — Negation",               desc:"Negating فعلية and اسمية · ليس · لا للجنس · ما/إن + إلا · من الزائدة"},
        {num:10,color:"var(--teal)", label:"Chapter 10 — الأفعال الناقصة",       desc:"كان and sisters · اسم كان · خبر منصوب · complex structure · two templates"},
        {num:11,color:"var(--purple)",label:"Chapter 11 — The Compound اسم",     desc:"أن المصدرية · أنّ · إذ · إذا · يوم + The حرف Reference Sheet"},
      ].map(a=>(

      <div className="h-dark fi">These 6 verbs are <strong style={{color:"var(--gold)"}}>incomplete in meaning</strong>. They look like verbal sentences but are labeled as <strong style={{color:"var(--gold2)"}}>جملة اسمية</strong>. A sentence with a فعل ناقص cannot be a جملة فعلية.</div>

          {ar:"ظَلَّ / يَظَلُّ",en:"To remain / to keep doing",note:""},
          {ar:"مَا زَالَ / لَا يَزَالُ",en:"To still be / to continue",note:""},
          {ar:"مَا دَامَ",en:"As long as…",note:"Only appears in ماضي form but translates present."},

            <div><div style={{fontWeight:600,color:"var(--navy)",fontSize:".88rem"}}>{k.en}</div>{k.note&&<div style={{fontSize:".8rem",color:"var(--mgray)",marginTop:".15rem"}}>{k.note}</div>}</div>
          </div>
        ))}
      </div>
      <div className="note fi">
        <strong>Key difference from normal فعل:</strong> "كَانَ" alone = incomplete. Compare: "أَكَلَ" = "He ate" — complete. Sentences with كان are classified and labeled like <strong>جملة اسمية</strong>, not فعلية.
      </div>
    </Slide>

    {/* 10.2 SENTENCE STRUCTURE */}

      <div className="h-gold fi">The مبتدأ in a كان sentence = the <strong>فعل ناقص</strong> + the word/fragment before it (<strong>اسم كان</strong>). The اسم كان follows the SAME rules as a فاعل.</div>

    {/* 10.2 KHABAR MANSUB */}
    <Slide id="s-khabar" dark>
      <div className="fi"><Tag color="gold">10.2 — الخبر منصوب</Tag></div>
      <div className="fi"><Title>The Key Difference: خبر is منصوب</Title></div>
      <div className="h-gold fi">In an ordinary جملة اسمية the خبر is <strong>مرفوع</strong>. In a كان sentence the خبر is <strong>مَنْصُوب</strong>. This is the most important grammatical difference.</div>
      <div className="two-col fi">
        <div style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(201,147,59,.25)",borderRadius:"10px",padding:"1.1rem 1.2rem"}}>
          <div style={{fontWeight:700,color:"var(--gold)",marginBottom:".8rem"}}>Normal جملة اسمية</div>
          {[
            {ar:"اللَّهُ غَفُورٌ",label:"مبتدأ مرفوع + خبر مرفوع",en:"Allah [is] Forgiving."},
            {ar:"الْوَلَدُ طَالِبٌ",label:"Both مرفوع",en:"The boy [is] a student."},
          ].map(e=>(

          <div style={{fontWeight:700,color:"var(--gold)",marginBottom:".8rem"}}>كان Sentence — خبر is منصوب!</div>
          {[
            {ar:"كَانَ اللَّهُ غَفُورًا",label:"اسم كان مرفوع + خبر كان مَنصوب",en:"Allah has always been Forgiving."},
            {ar:"كَانَ الْوَلَدُ طَالِبًا",label:"اسم مرفوع + خبر مَنصوب",en:"The boy was a student."},
            {ar:"كَانَ عَرْشُهُ عَلَى الْمَاءِ",label:"متعلق بالخبر (same rules)",en:"His throne was on water."},
          ].map(e=>(

              <span className="ar" style={{color:"var(--gold)",fontSize:"1.1rem"}}>{e.ar}</span>

      <div className="note fi note-dark" style={{marginTop:"1rem"}}>

      </div>
    </Slide>

    {/* 10.3 ABNORMAL */}
    <Slide id="s-naqisa-abn">
      <div className="fi"><Tag>10.3 — Abnormal Structure</Tag></div>
      <div className="fi"><Title>Shifting the Order in كان Sentences</Title></div>
      <div className="h-dark fi">
        Standard: <strong style={{color:"var(--gold)"}}>مبتدأ → خبر → متعلق بالخبر</strong>. Two shifts are possible:
      </div>
      <div className="two-col fi">
        <div className="card">
          <div className="card-h" style={{background:"var(--gold)"}}>متعلق بالخبر before خبر</div>
          <div className="card-b">
            <div style={{fontSize:".85rem",color:"var(--mgray)",marginBottom:".7rem"}}>The جار ومجرور comes between the فعل ناقص and its خبر. This is common.</div>
            <div className="ex">
              <div className="ex-ar">قَدْ كُنْتَ فِينَا مَرْجُوًّا</div>
              <div className="ex-en">You had been a source of hope amongst us.</div>
              <div className="ex-note">فِينَا (متعلق) comes before مَرْجُوًّا (خبر)</div>
            </div>
          </div>
        </div>
        <div className="card">
          <div className="card-h" style={{background:"var(--teal)"}}>متعلق بالخبر before مبتدأ (possessive)</div>
          <div className="card-b">
            <div style={{fontSize:".85rem",color:"var(--mgray)",marginBottom:".7rem"}}>Common in "he had…" constructions. Note: جار ومجرور can come between فعل ناقص and اسم كان, but NOT before the فعل ناقص itself.</div>
            <div className="ex" style={{marginBottom:".6rem"}}>
              <div className="ex-ar">وَكَانَ لَهُ ثَمَرٌ</div>
              <div className="ex-en">And he had fruit. (lit. For him was fruit.)</div>
              <div className="ex-note">لَهُ = متعلق مقدم · ثَمَرٌ = اسم كان مؤخر</div>
            </div>
            <div className="ex">
              <div className="ex-ar">فَلَيْسَ عَلَيْكُمْ جُنَاحٌ</div>
              <div className="ex-en">So, there is no blame on you.</div>
              <div className="ex-note">عَلَيْكُمْ = متعلق مقدم · جُنَاحٌ = اسم كان مؤخر</div>
            </div>
          </div>
        </div>
      </div>
    </Slide>

    {/* 10.4 COMPLEX */}
    <Slide id="s-naqisa-cplx" dark>
      <div className="fi"><Tag color="purple">10.4 — Complex Structure</Tag></div>
      <div className="fi"><Title>A Full جملة فعلية Inside the خبر of كان</Title></div>
      <div className="h-gold fi">The خبر of كان can hold a complete <strong>جملة فعلية</strong>. Two tense combinations with unique meanings:</div>
      <div className="two-col fi">
        <div>
          <div className="card" style={{marginBottom:"1rem"}}>
            <div className="card-h" style={{background:"var(--teal)"}}>كَانَ + مضارع inside خبر</div>
            <div className="card-b">
              <div style={{fontWeight:700,color:"var(--navy)",marginBottom:".5rem",fontSize:".85rem"}}>Two possible meanings:</div>
              <div style={{background:"rgba(29,122,140,.1)",borderRadius:"6px",padding:".6rem .8rem",marginBottom:".4rem",fontSize:".83rem"}}>→ "Was/were DOING" (ongoing past action)<br/>e.g. I was cooking.</div>
              <div style={{background:"rgba(201,147,59,.1)",borderRadius:"6px",padding:".6rem .8rem",fontSize:".83rem"}}>→ "USED TO do" (habitual past)<br/>e.g. I used to cook.</div>
              <div className="ex" style={{marginTop:".7rem"}}>
                <div className="ex-ar">إِنَّمَا كُنَّا نَخُوضُ وَنَلْعَبُ</div>
                <div className="ex-en">We were only chatting idly and playing.</div>
                <div className="ex-note">نَحْنُ inside كُنَّا matches نَحْنُ inside نَخُوضُ</div>
              </div>
            </div>
          </div>
        </div>
        <div>
          <div className="card" style={{marginBottom:"1rem"}}>
            <div className="card-h" style={{background:"var(--navy)"}}>كَانَ + ماضي inside خبر</div>
            <div className="card-b">
              <div style={{fontSize:".85rem",color:"var(--mgray)",marginBottom:".7rem"}}>Implies the event occurred LONG AGO. Not used in modern Arabic. Rare in Quran. The inside pronoun of كان matches the inside pronoun of the ماضي inside.</div>
              <div className="ex">
                <div className="ex-ar">إِنْ كُنْتُ قُلْتُهُ فَقَدْ عَلِمْتَهُ</div>
                <div className="ex-en">Had I said it long ago, you would have known it.</div>
                <div className="ex-note">أَنَا inside كُنْتُ matches أَنَا inside قُلْتُ</div>
              </div>
            </div>
          </div>
          <div className="note note-dark">
            <strong style={{color:"var(--gold)"}}>Key rule:</strong> When خبر is a full sentence, the pronoun inside the فعل of the خبر must MATCH the اسم كان (مبتدأ) in number and gender. The status of the فعل inside the خبر stays مرفوع.
          </div>
        </div>
      </div>
    </Slide>

    {/* 10.5 TRANSLATING */}
    <Slide id="s-naqisa-trans">
      <div className="fi"><Tag>10.5 — Translating</Tag></div>
      <div className="fi"><Title>كان + مضارع — The Meaning Combinations</Title></div>
      <div className="h-dark fi">All الأفعال الناقصة can combine with a مضارع in the خبر to give compound meanings. Each sister has its own flavor:</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:".8rem"}} className="fi">
        {[
          {kan:"كَانَ + مضارع",en:"Used to do / was doing",col:"var(--gold)"},
          {kan:"مَا زَالَ / لَا يَزَالُ + مضارع",en:"Is still doing / continues to",col:"var(--teal)"},
          {kan:"مَا دَامَ + مضارع",en:"As long as (he) is doing",col:"var(--green)"},
          {kan:"أَصْبَحَ + مضارع",en:"Started to do / became doing",col:"var(--navy)"},
          {kan:"لَيْسَ + مضارع",en:"Does not do (present)",col:"var(--red)"},
          {kan:"ظَلَّ + مضارع",en:"Kept doing / remained doing",col:"var(--purple)"},
        ].map(k=>(
          <div key={k.kan} style={{background:"#fff",border:`2px solid ${k.col}`,borderRadius:"8px",padding:".8rem 1rem"}}>
            <div className="ar" style={{color:k.col,fontSize:"1rem",fontWeight:700}}>{k.kan}</div>
            <div style={{fontWeight:600,fontSize:".85rem",color:"var(--navy)",marginTop:".2rem"}}>{k.en}</div>
          </div>
        ))}
      </div>
      <div className="note fi" style={{marginTop:"1rem"}}>
        <strong>Translation order for كان sentences:</strong> Unlike a جملة فعلية where you translate فعل first, in كان sentences translate as: <strong style={{color:"var(--gold)"}}>اسم كان → فعل ناقص → خبر/متعلق</strong><br/>
        e.g. <span className="ar" style={{color:"var(--gold)"}}>كَانَ اللَّهُ سَمِيعًا بَصِيرًا</span> → "Allah has always been Hearing, Seeing." (اسم → كان → خبر)
      </div>
    </Slide>

    {/* 10.6 NEGATING KAN */}
    <Slide id="s-naqisa-neg" dark>
      <div className="fi"><Tag color="red">10.6 — Negating كان Sentences</Tag></div>
      <div className="fi"><Title>Negation of الأفعال الناقصة</Title></div>
      <div className="h-gold fi">Although كان sentences are labeled as <strong>جملة اسمية</strong>, they are negated like a <strong>جملة فعلية</strong> because they BEGIN with a فعل.</div>
      <div className="fi" style={{overflowX:"auto",marginBottom:"1.2rem"}}>
        <table className="dkdt">
          <thead><tr><th>Tense</th><th>Method 1</th><th>Method 2</th><th>Notes</th></tr></thead>
          <tbody>
            {[
              ["PAST","مَا + ماضي ناقص","لَمْ + مضارع ناقص مجزوم","مَا is easier — many ناقصة are irregular in مجزوم"],
              ["PRESENT","لَا + مضارع ناقص مرفوع","مَا + مضارع ناقص مرفوع","Plain vs refutation"],
              ["FUTURE","لَنْ + مضارع ناقص منصوب","—","لَنْ يَكُونَ"],
            ].map(([t,m1,m2,n])=>(
              <tr key={t}>
                <td style={{fontWeight:700,color:"var(--gold)"}}>{t}</td>
                <td><span className="ar" style={{color:"var(--gold2)",fontSize:".95rem"}}>{m1}</span></td>
                <td><span className="ar" style={{color:"var(--teal2)",fontSize:".95rem"}}>{m2}</span></td>
                <td style={{fontSize:".78rem",color:"rgba(255,255,255,.5)"}}>{n}</td>
              </tr>
            ))}
          </tbody>
        </table>

          {ar:"وَ",en:"and",desc:"Most common. Joins two words/fragments/sentences of equal standing.",ex:"إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ",exen:"Certainly Allah and His angels send blessings on the Prophet."},
          {ar:"أَوْ",en:"or",desc:"Gives a choice or alternative between two options.",ex:"فَهِيَ كَالْحِجَارَةِ أَوْ أَشَدُّ قَسْوَةً",exen:"So they are like stone or even harder."},
          {ar:"ثُمَّ",en:"and then (long gap)",desc:"Indicates a longer duration of time between the two connected items.",ex:"كَيْفَ تَكْفُرُونَ… فَأَحْيَاكُمْ ثُمَّ يُمِيتُكُمْ ثُمَّ يُحْيِيكُمْ ثُمَّ إِلَيْهِ تُرْجَعُونَ",exen:"…then He gave life, then will cause death, then give life, then you will return to Him."},
          {ar:"فَ",en:"and then / so (immediate)",desc:"Indicates immediate sequence. Also used in result clauses ('so'). Shorter time gap than ثُمَّ.",ex:"الَّذِي خَلَقَكَ فَسَوَّاكَ فَعَدَلَكَ",exen:"The one who created you, then fashioned you perfectly, then proportioned you."},
          {ar:"بَلْ",en:"rather / in fact",desc:"Corrects or upgrades the previous statement.",ex:"وَقَالُوا اتَّخَذَ اللَّهُ وَلَدًا… بَلْ لَهُ مَا فِي السَّمَاوَاتِ",exen:"They said 'Allah took a son'… Rather, His is whatever is in the skies."},
          {ar:"لَكِنْ",en:"however",desc:"Introduces a contrast or exception to what came before.",ex:"أَسْمِعْ بِهِمْ وَأَبْصِرْ يَوْمَ يَأْتُونَنَا لَكِنِ الظَّالِمُونَ الْيَوْمَ فِي ضَلَالٍ",exen:"How they will hear and see the Day they come to Us! However, the wrongdoers today are in clear error."},
        ].map(h=>(
          <div key={h.ar} className="atf-card">
            <div style={{display:"flex",gap:"1rem",alignItems:"flex-start"}}>
              <div>
                <div className="atf-ar">{h.ar}</div>
                <div className="atf-en-meaning">{h.en}</div>
                <div style={{fontSize:".82rem",color:"var(--mgray)",marginBottom:".5rem"}}>{h.desc}</div>
                <div className="atf-ex-ar">{h.ex}</div>
                <div className="atf-ex-en">{h.exen}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </Slide>

    {/* FINAL RECAP */}
    <Slide id="s-final" dark>
      <div className="fi">
        <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
          <div className="divider-ch">Chapters 9–11 Complete</div>
          <h2 className="slide-title" style={{color:"#fff",textAlign:"center"}}>Master Summary</h2>
        </div>
      </div>
      {[
        {label:"Ch 9 — Negating الفعلية",text:"Past: لَمْ + مجزوم (plain) · مَا + ماضي (debate). Present: لَا + مرفوع (plain) · مَا + مرفوع (debate). Future: لَنْ + منصوب. Not-yet: لَمَّا + مجزوم."},
        {label:"Ch 9 — Negating الاسمية",text:"4 patterns: مَا or لَيْسَ + مبتدأ مرفوع + (خبر منصوب OR خبر مجرور+باء زائدة). مَا = refutation; لَيْسَ = plain; باء الزائدة adds 'not at all'. لَيْسَ conjugates like ماضي."},
        {label:"Ch 9 — لا للجنس",text:"'There is absolutely no X'. اسم after it must be: light · منصوب · followed by جار ومجرور. This is the 3rd reason to make an اسم light. Heavy اسم after لا = regular نافية (room for exception)."},
        {label:"Ch 9 — Shared Tools",text:"مَا/إِنْ + sentence + إِلَّا = 'nothing but / only'. They are add-ons with no grammatical effect. Remove them → complete normal sentence remains. إِنْ is more emphatic than مَا."},
        {label:"Ch 9 — مِنَ الزائدة",text:"Extra مِن meaning 'not a single/any'. 3 conditions: negated/questioning sentence · common word follows · sentence makes sense after removal. In اسمية → attaches to مبتدأ. In فعلية → attaches to فاعل or مفعول به."},
        {label:"Ch 10 — الأفعال الناقصة",text:"6 sisters: كان · أصبح · ظل · ما زال · ما دام · ليس. Labeled as جملة اسمية. مبتدأ = فعل ناقص + اسم كان (مرفوع, follows فاعل rules). KEY: خبر كان is منصوب (unlike normal جملة اسمية)."},
        {label:"Ch 10 — كان + مضارع",text:"Used to do / was doing. Each sister gives a nuance: ما زال = still doing; ظل = kept doing; أصبح = started doing; ما دام = as long as; ليس = does not do. Negated like فعلية (begins with فعل)."},
        {label:"Ch 10 — Two Templates",text:"(1) مَا كَانَ لِـ(X) أَنْ (Y) = It's not appropriate for X to Y. (2) مَا كَانَ (X) لِـ(Y) = X would not be one to Y."},
        {label:"Ch 11 — Compound اسم",text:"أَنْ (المصدرية) turns جملة فعلية into compound اسم (makes فعل منصوب). أَنَّ turns جملة اسمية into compound اسم (makes اسم منصوب). إِذْ = when (past), إِذَا = suddenly/when (future), يَوْمَ = the day on which. All create compound مضاف إليه."},
        {label:"حرف Ref Sheet",text:"لَامُ التوكيد = emphasis, no effect. قَدْ = certainty/already, no effect. سـ/سوف = future marker, no effect. واو استئنافية = new sentence starter, not translated. إِمَّا = either (used twice). حروف العطف (و·أو·ثم·ف·بل·لكن) carry over status."},
      ].map(r=>(
        <div key={r.label} className="recap-row fi">
          <div className="recap-lbl">{r.label}</div>
          <div className="recap-txt">{r.text}</div>
        </div>
      ))}
      <div className="fi" style={{borderTop:"1px solid rgba(201,147,59,.3)",marginTop:"1.5rem",paddingTop:"1rem",textAlign:"center",color:"rgba(255,255,255,.4)",fontStyle:"italic",fontSize:".85rem"}}>

      </div>
