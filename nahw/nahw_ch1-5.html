<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bayyinah Dream — Arabic of the Quran · Chapters 1–5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#1A2744; --navy2:#22304A; --navy3:#1D2A3D;
      --gold:#C9933B; --gold2:#E8AD55;
      --cream:#F5F0E8; --cream2:#EDE7D8;
      --teal:#1D7A8C; --teal2:#258EA3;
      --white:#FFFFFF; --dgray:#2D2D2D; --mgray:#5A5A6A; --lgray:#E8E4DC;
      --green:#2E7D52; --purple:#6B3FA0;
    }
    html { scroll-behavior: smooth; }
    body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--dgray); min-height:100vh; }
    .arabic { font-family:'Noto Naskh Arabic',serif; direction:rtl; }
    .serif  { font-family:'Cormorant Garamond',serif; }

    /* PROGRESS */
    #progress-bar { position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--teal));z-index:1000;transition:width .2s ease; }

    /* NAV */
    nav { position:fixed;top:0;left:0;right:0;background:rgba(26,39,68,.97);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid rgba(201,147,59,.25); }
    .nav-inner { max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:58px; }
    .nav-logo { font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--gold);text-decoration:none;letter-spacing:.04em; }
    .nav-logo span { color:var(--white); }
    .nav-chapters { display:flex;gap:.15rem;align-items:center;overflow-x:auto;max-width:80%; }
    .nav-btn { background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.74rem;color:rgba(255,255,255,.5);padding:.3rem .6rem;border-radius:4px;transition:all .2s;white-space:nowrap; }
    .nav-btn:hover { color:var(--gold);background:rgba(201,147,59,.1); }
    .nav-btn.active { color:var(--gold);background:rgba(201,147,59,.18); }
    .nav-counter { font-size:.7rem;color:rgba(255,255,255,.3);border-left:1px solid rgba(255,255,255,.1);padding-left:.9rem;margin-left:.4rem;white-space:nowrap; }

    /* SLIDES */
    .slides-wrapper { padding-top:58px; }
    .slide { min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:5rem 2rem 4rem;position:relative;overflow:hidden; }
    .slide-inner { max-width:1000px;margin:0 auto;width:100%;position:relative;z-index:2; }
    .slide-dark { background:var(--navy);color:var(--white); }
    .slide-dark::before { content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(29,122,140,.18) 0%,transparent 60%),radial-gradient(ellipse at 10% 80%,rgba(201,147,59,.1) 0%,transparent 50%);pointer-events:none; }
    .slide-light { background:var(--cream);color:var(--dgray); }
    .slide-light::before { content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 90% 10%,rgba(29,122,140,.07) 0%,transparent 55%);pointer-events:none; }
    .slide-white { background:#fff;color:var(--dgray); }

    /* DECORATIONS */
    .gold-bar { position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--teal),var(--gold)); }
    .section-tag { display:inline-block;background:var(--gold);color:var(--navy);font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.3rem .85rem;border-radius:4px;margin-bottom:1.2rem; }
    .section-tag-teal { background:var(--teal);color:#fff; }
    .section-tag-green { background:var(--green);color:#fff; }

    /* TITLE */
    .slide-title { font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,5vw,3rem);font-weight:700;line-height:1.15;margin-bottom:1.8rem; }
    .slide-dark .slide-title { color:var(--white); }
    .slide-light .slide-title, .slide-white .slide-title { color:var(--navy); }

    /* HERO */
    .hero-bismillah { font-family:'Noto Naskh Arabic',serif;font-size:clamp(1.4rem,4vw,2rem);color:var(--gold);text-align:center;margin-bottom:1.5rem;direction:rtl;animation:fadeUp .8s ease both; }
    .hero-eyebrow { text-align:center;letter-spacing:.2em;font-size:.8rem;font-weight:600;color:var(--teal);text-transform:uppercase;margin-bottom:.75rem;animation:fadeUp .8s .1s ease both; }
    .hero-title { font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,8vw,5.5rem);font-weight:700;line-height:1.05;color:var(--white);text-align:center;margin-bottom:1rem;animation:fadeUp .8s .2s ease both; }
    .hero-sub { text-align:center;color:rgba(255,255,255,.6);font-size:1.05rem;margin-bottom:.5rem;animation:fadeUp .8s .3s ease both; }
    .hero-divider { width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.5rem auto;animation:fadeUp .8s .4s ease both; }
    .hero-tagline { text-align:center;color:var(--gold);font-style:italic;font-size:.9rem;animation:fadeUp .8s .5s ease both; }
    .hero-credit { text-align:center;color:rgba(255,255,255,.3);font-size:.8rem;margin-top:2.5rem;animation:fadeUp .8s .6s ease both; }

    /* AGENDA */
    .agenda-card { display:flex;align-items:center;gap:1.2rem;background:var(--white);border:1px solid var(--lgray);border-radius:10px;padding:1rem 1.4rem;margin-bottom:.9rem;box-shadow:0 2px 12px rgba(0,0,0,.05);transition:transform .2s,box-shadow .2s; }
    .agenda-card:hover { transform:translateX(4px);box-shadow:0 4px 20px rgba(0,0,0,.09); }
    .agenda-num { width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;color:var(--white);flex-shrink:0; }
    .agenda-card-label { font-weight:600;font-size:.85rem;margin-bottom:.15rem; }
    .agenda-card-desc { font-size:.88rem;color:var(--mgray); }

    /* WORD TYPE GRID */
    .word-type-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:1rem; }
    @media(max-width:700px){ .word-type-grid { grid-template-columns:1fr; } }
    .word-card { border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1); }
    .word-card-header { padding:1.4rem 1.2rem 1rem;display:flex;flex-direction:column;align-items:center; }
    .word-card-arabic { font-family:'Noto Naskh Arabic',serif;font-size:3rem;font-weight:700;color:var(--white);line-height:1.1; }
    .word-card-roman { font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:600;letter-spacing:.15em;color:rgba(255,255,255,.75);margin-top:.3rem;text-transform:uppercase; }
    .word-card-body { background:var(--white);padding:1.2rem; }
    .word-card-def { font-size:.88rem;color:var(--mgray);line-height:1.6; }

    /* TABLES */
    .data-table { width:100%;border-collapse:collapse;margin-top:.5rem; }
    .data-table th { background:var(--navy);color:var(--white);font-size:.77rem;font-weight:600;letter-spacing:.04em;padding:.6rem .9rem;text-align:left; }
    .data-table td { padding:.55rem .9rem;font-size:.88rem;border-bottom:1px solid var(--lgray); }
    .data-table tr:nth-child(even) td { background:rgba(232,228,220,.4); }
    .data-table tr:last-child td { border-bottom:none; }
    .td-arabic { font-family:'Noto Naskh Arabic',serif;font-size:1.15rem;font-weight:600;color:var(--gold);text-align:center; }
    .dark-table { width:100%;border-collapse:collapse;border-radius:8px;overflow:hidden; }
    .dark-table th { background:var(--gold);color:var(--navy);font-size:.77rem;font-weight:700;letter-spacing:.05em;padding:.65rem 1rem;text-align:left; }
    .dark-table td { padding:.65rem 1rem;font-size:.88rem;border-bottom:1px solid rgba(255,255,255,.06);color:var(--white); }
    .dark-table tr:nth-child(even) td { background:rgba(255,255,255,.04); }
    .dark-table tr:last-child td { border-bottom:none; }
    .dark-table .td-arabic { color:var(--gold2); }

    /* STATUS ROWS */
    .status-row { display:flex;gap:1.2rem;align-items:stretch;background:var(--white);border:1px solid var(--lgray);border-radius:10px;padding:1rem 1.3rem;margin-bottom:.9rem;box-shadow:0 2px 10px rgba(0,0,0,.04);transition:transform .18s; }
    .status-row:hover { transform:translateX(3px); }
    .status-row-accent { width:5px;border-radius:3px;flex-shrink:0; }
    .status-row-num { width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:var(--white);flex-shrink:0;align-self:flex-start;margin-top:2px; }
    .status-row-content { flex:1; }
    .status-row-arabic { font-family:'Noto Naskh Arabic',serif;font-size:1.6rem;font-weight:700;line-height:1; }
    .status-row-term { font-weight:700;font-size:1rem;margin-bottom:.25rem; }
    .status-row-desc { font-size:.87rem;color:var(--mgray);line-height:1.5; }

    /* HIGHLIGHT BOXES */
    .highlight-dark { background:var(--navy);color:var(--white);border-radius:8px;padding:1rem 1.3rem;font-size:.95rem;font-weight:600;margin-bottom:1.3rem; }
    .highlight-gold { background:var(--gold);color:var(--navy);border-radius:8px;padding:1rem 1.3rem;font-size:.95rem;font-weight:600;margin-bottom:1.3rem; }
    .highlight-teal { background:var(--teal);color:var(--white);border-radius:8px;padding:1rem 1.3rem;font-size:.95rem;font-weight:600;margin-bottom:1.3rem; }
    .note-box { background:var(--lgray);border-radius:8px;padding:.9rem 1.2rem;font-size:.87rem;color:var(--navy);margin-top:1.2rem; }
    .note-box strong { color:var(--gold); }
    .rule-box { background:rgba(201,147,59,.12);border:1px solid rgba(201,147,59,.4);border-radius:8px;padding:.9rem 1.2rem;font-size:.9rem;color:var(--navy);margin-bottom:1rem; }
    .rule-box strong { color:var(--gold); }

    /* STEP LIST */
    .step-list { list-style:none; }
    .step-item { display:flex;gap:1rem;align-items:flex-start;padding:.8rem 1.1rem;background:var(--white);border:1px solid var(--lgray);border-radius:8px;margin-bottom:.7rem;font-size:.9rem;color:var(--dgray); }
    .step-num { background:var(--teal);color:var(--white);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0; }

    /* COLUMNS */
    .two-col { display:grid;grid-template-columns:1fr 1fr;gap:1.5rem; }
    @media(max-width:680px){ .two-col { grid-template-columns:1fr; } }
    .three-col { display:grid;grid-template-columns:repeat(3,1fr);gap:1rem; }
    @media(max-width:700px){ .three-col { grid-template-columns:1fr; } }
    .col-card { background:var(--white);border:1px solid var(--lgray);border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05); }
    .col-card-header { padding:.85rem 1.2rem;color:var(--white);font-weight:700;font-size:.82rem;letter-spacing:.04em; }
    .col-card-body { padding:1rem 1.2rem; }

    /* MARKER GRID */
    .marker-grid { display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin:1.2rem 0; }
    @media(max-width:600px){ .marker-grid { grid-template-columns:1fr; } }
    .marker-card { border-radius:10px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.07); }
    .marker-card-top { height:4px; }
    .marker-card-body { background:var(--white);padding:1.3rem 1.4rem;border:1px solid var(--lgray);border-top:none;border-radius:0 0 10px 10px; }
    .marker-card-title { font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--dgray);margin-bottom:.2rem; }
    .marker-card-sub { font-size:.8rem;color:var(--mgray);margin-bottom:.8rem; }
    .marker-card-desc { font-size:.87rem;color:var(--mgray);line-height:1.6; }

    /* RECAP ROWS */
    .recap-row { display:flex;gap:1rem;align-items:flex-start;background:rgba(255,255,255,.07);border:1px solid rgba(201,147,59,.25);border-radius:8px;padding:.95rem 1.2rem;margin-bottom:.8rem; }
    .recap-row-label { font-size:.74rem;font-weight:700;color:var(--gold);white-space:nowrap;padding-top:.1rem;min-width:100px; }
    .recap-row-text { font-size:.9rem;color:rgba(255,255,255,.85);line-height:1.55; }

    /* DIVIDER SLIDE */
    .divider-slide { text-align:center; }
    .divider-ch { font-size:.78rem;font-weight:700;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.5rem; }
    .divider-title { font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,7vw,4.5rem);font-weight:700;color:var(--white);margin-bottom:.4rem; }
    .divider-subtitle { font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,3vw,1.9rem);color:rgba(255,255,255,.55);margin-bottom:1.5rem; }
    .divider-hr { width:80px;height:1.5px;background:var(--gold);margin:0 auto 1.2rem; }
    .divider-sub { font-size:.95rem;color:rgba(255,255,255,.5);font-style:italic;margin-bottom:2rem; }
    .property-pills { display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap; }
    .property-pill { padding:.45rem 1rem;border-radius:6px;font-size:.82rem;border:1px solid; }
    .pill-active { background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:700; }
    .pill-inactive { background:transparent;color:rgba(255,255,255,.45);border-color:rgba(201,147,59,.35); }

    /* HARF GRID */
    .harf-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin:1rem 0; }
    @media(max-width:500px){ .harf-grid { grid-template-columns:repeat(2,1fr); } }
    .harf-chip { background:var(--white);border:1px solid var(--gold);border-radius:8px;padding:.55rem .7rem;text-align:center; }
    .harf-ar { font-family:'Noto Naskh Arabic',serif;font-size:1.1rem;font-weight:700;color:var(--gold);direction:rtl; }
    .harf-en { font-size:.72rem;color:var(--mgray);margin-top:.1rem; }

    /* PRONOUN TABLE */
    .pronoun-grid { display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-top:1rem; }
    @media(max-width:600px){ .pronoun-grid { grid-template-columns:1fr; } }

    /* FRAGMENT CARD */
    .frag-card { background:var(--white);border:1px solid var(--lgray);border-radius:10px;padding:1rem 1.3rem;margin-bottom:.9rem;border-left:4px solid var(--gold);box-shadow:0 2px 10px rgba(0,0,0,.04); }
    .frag-title { font-family:'Noto Naskh Arabic',serif;font-size:1.2rem;font-weight:700;color:var(--gold);direction:rtl; }
    .frag-en { font-weight:600;font-size:.85rem;color:var(--navy);margin:.2rem 0; }
    .frag-desc { font-size:.87rem;color:var(--mgray);line-height:1.55; }

    /* EXAMPLE BOX */
    .ex-box { background:var(--white);border:1px solid var(--lgray);border-radius:10px;padding:1rem 1.3rem;margin-bottom:.8rem; }
    .ex-ar { font-family:'Noto Naskh Arabic',serif;font-size:1.4rem;font-weight:700;color:var(--navy);direction:rtl;margin-bottom:.4rem; }
    .ex-en { font-size:.9rem;color:var(--mgray);font-style:italic; }
    .ex-note { font-size:.8rem;color:var(--teal);margin-top:.3rem;font-weight:600; }

    /* SENTENCE LABEL */
    .sent-label { display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-top:.6rem; }
    .lbl { font-size:.7rem;font-weight:700;padding:.2rem .55rem;border-radius:4px;color:#fff; }
    .lbl-gold { background:var(--gold);color:var(--navy); }
    .lbl-teal { background:var(--teal); }
    .lbl-navy { background:var(--navy); }
    .lbl-green { background:var(--green); }

    /* CATEGORY CARDS */
    .cat-list { display:flex;flex-direction:column;gap:.7rem; }
    .cat-item { display:flex;gap:1rem;align-items:flex-start;background:var(--white);border:1px solid var(--lgray);border-radius:8px;padding:.85rem 1.1rem; }
    .cat-num { background:var(--gold);color:var(--navy);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;margin-top:1px; }
    .cat-title { font-weight:700;font-size:.87rem;color:var(--navy);margin-bottom:.2rem; }
    .cat-desc { font-size:.85rem;color:var(--mgray);line-height:1.5; }
    .cat-examples { font-size:.8rem;color:var(--teal);margin-top:.25rem; }

    /* DOER / AOF EXAMPLES */
    .doer-ex { background:var(--white);border:1px solid var(--lgray);border-radius:8px;padding:.85rem 1.1rem;margin-bottom:.7rem;box-shadow:0 1px 6px rgba(0,0,0,.04); }
    .doer-ex-sent { font-size:.9rem;color:var(--dgray);margin-bottom:.35rem;font-style:italic; }
    .doer-ex-meta { font-size:.8rem;color:var(--mgray); }
    .doer-ex-meta b { color:var(--gold); }

    /* TENSE GRID */
    .tense-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:.5rem; }
    @media(max-width:600px){ .tense-grid { grid-template-columns:1fr; } }
    .tense-card { background:var(--white);border:1px solid var(--lgray);border-radius:10px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05); }
    .tense-card-top { height:4px; }
    .tense-card-body { padding:1.1rem 1.1rem .9rem; }
    .tense-label { font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--dgray); }
    .tense-example { font-size:.85rem;color:var(--mgray);margin-bottom:.2rem; }

    /* SENT STRUCTURE */
    .sent-structure { background:var(--navy);border-radius:10px;padding:1.2rem;display:flex;gap:.8rem;align-items:stretch;flex-wrap:wrap; }
    .sent-part { flex:1;min-width:140px;background:rgba(255,255,255,.07);border:1px solid rgba(201,147,59,.3);border-radius:8px;padding:.9rem 1rem;text-align:center; }
    .sent-part-label { font-size:.72rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem; }
    .sent-part-ar { font-family:'Noto Naskh Arabic',serif;font-size:1.1rem;color:var(--white);direction:rtl; }
    .sent-part-en { font-size:.8rem;color:rgba(255,255,255,.55);margin-top:.2rem; }
    .sent-arrow { color:rgba(201,147,59,.6);font-size:1.4rem;align-self:center; }

    /* FOOTER */
    footer { background:var(--navy);color:rgba(255,255,255,.35);text-align:center;padding:1.8rem;font-size:.78rem;border-top:1px solid rgba(201,147,59,.2); }
    footer a { color:var(--gold);text-decoration:none; }
    .scroll-top { position:fixed;bottom:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;background:var(--gold);color:var(--navy);border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.2);transition:opacity .3s,transform .2s;z-index:99; }
    .scroll-top:hover { transform:translateY(-2px); }

    /* ANIMATION */
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease; }
    .fade-in.visible { opacity:1;transform:translateY(0); }

    @media(max-width:768px){ .nav-chapters{display:none} .slide{padding:4.5rem 1.2rem 3rem} }
  </style>
</head>
<body>
<div id="progress-bar"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const NAV_LINKS = [
  { label:"Intro",       id:"slide-intro" },
  { label:"Ch 1",        id:"slide-ch1" },
  { label:"اسم",         id:"slide-ism" },
  { label:"فعل",         id:"slide-fil" },
  { label:"حرف",         id:"slide-harf" },
  { label:"Ch 2",        id:"slide-ch2" },
  { label:"Status",      id:"slide-status" },
  { label:"Markers",     id:"slide-markers" },
  { label:"Heavy/Light", id:"slide-heavy" },
  { label:"Flexibility", id:"slide-flex" },
  { label:"Pronouns",    id:"slide-pron" },
  { label:"Fragments",   id:"slide-frags" },
  { label:"حرف جر",      id:"slide-harfjr" },
  { label:"حرف نصب",     id:"slide-harfnsb" },
  { label:"إضافة",       id:"slide-idafa" },
  { label:"Ch 3",        id:"slide-ch3" },
  { label:"Gender",      id:"slide-gender" },
  { label:"Number",      id:"slide-number" },
  { label:"Type",        id:"slide-type" },
  { label:"Ch 4",        id:"slide-ch4" },

function useScrollProgress() {
  const [p, setP] = useState(0);
  useEffect(() => {
    const fn = () => {
      const el = document.documentElement;
      const s = el.scrollTop || document.body.scrollTop;
      const t = el.scrollHeight - el.clientHeight;
      setP(t > 0 ? (s/t)*100 : 0);
    };
    window.addEventListener("scroll", fn, { passive:true });
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return p;
}

function useActiveSection(ids) {
  const [active, setActive] = useState(ids[0]);
  useEffect(() => {
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if(e.isIntersecting) setActive(e.target.id); }),
      { threshold:.35 }
    );
    ids.forEach(id => { const el = document.getElementById(id); if(el) obs.observe(el); });
    return () => obs.disconnect();
  }, [ids]);
  return active;
}

function useFadeIn() {
  useEffect(() => {
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add("visible"); }),
      { threshold:.15 }
    );
    document.querySelectorAll(".fade-in").forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function useShowTop() {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const fn = () => setShow(window.scrollY > 400);
    window.addEventListener("scroll", fn, { passive:true });
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return show;
}

                  { ar:"وَإِلَى اللَّهِ المَصِيرُ", en:"And to Allah ALONE is the final return." },

              <div className="col-card-header" style={{ background:"var(--teal)" }}>Pattern 2: خبر &amp; متعلق بالخبر Switch</div>
              <div className="col-card-body">
                <div style={{ fontSize:".88rem",color:"var(--mgray)",marginBottom:".7rem" }}>
                  The مبتدأ stays, but خبر and متعلق بالخبر swap positions. Can produce emphasis (توكيد) or show importance (اهتمام).
                </div>
                <div className="ex-box">
                  <div className="ex-ar">وَاللَّهُ عَلَى كُلِّ شَيْءٍ قَدِيرٌ</div>
                  <div className="ex-en">And Allah is completely capable over every single thing.</div>
                  <div className="ex-note">خبر (قَدِيرٌ) comes after متعلق بالخبر — emphasis on capability</div>
                </div>
                <div className="note-box" style={{ marginTop:"1rem" }}>
                  <strong>Labeling:</strong> When something appears before its expected place → label it <strong>مقدم</strong>. When something appears after → label it <strong>مؤخر</strong>.
                  If there is a مقدم there is always a مؤخر.
                </div>
              </div>
            </div>
          </div>
        </Slide>

        {/* ── 5.5 HE HAS / THERE IS ── */}
        <Slide id="slide-hehas" dark>
          <div className="fade-in"><SectionTag>5.5 — Possessive &amp; Existential Sentences</SectionTag></div>
          <div className="fade-in"><SlideTitle>"He Has" and "There Is" Sentences</SlideTitle></div>
          <div className="highlight-gold fade-in">
            Both structures use: <strong>متعلق بالخبر مقدم + مبتدأ مؤخر</strong>. The مبتدأ must be <strong>common</strong>.
          </div>
          <div className="two-col fade-in">
            <div className="col-card">
              <div className="col-card-header" style={{ background:"var(--navy)" }}>Possession — "He Has"</div>
              <div className="col-card-body">
                <div style={{ fontSize:".85rem",fontWeight:600,color:"var(--navy)",marginBottom:".5rem" }}>Template 1: لِـ + owner + item (default)</div>
                {[
                  { ar:"لَهَا شِرْبٌ", en:"She has a right to drink.", note:"(lit. For her is a right to drink)" },
                  { ar:"وَلِلْكَافِرِينَ عَذَابٌ أَلِيمٌ", en:"The disbelievers have a painful punishment.", note:"For the disbelievers is a painful punishment" },
                ].map(e => (
                  <div key={e.ar} className="ex-box" style={{ marginBottom:".5rem" }}>
                    <div className="ex-ar" style={{ fontSize:"1.1rem" }}>{e.ar}</div>
                    <div className="ex-en">{e.en}</div>
                    <div className="ex-note">{e.note}</div>
                  </div>
                ))}
                <div style={{ fontSize:".85rem",fontWeight:600,color:"var(--navy)",margin:".7rem 0 .4rem" }}>Template 2: عِنْدَ + owner + item (closeness)</div>
                {[
                  { ar:"وَعِنْدَهُ أُمُّ الكِتَابِ", en:"With only Him is the essence of the book.", note:"عِنْدَ implies exclusive closeness" },
                ].map(e => (
                  <div key={e.ar} className="ex-box">
                    <div className="ex-ar" style={{ fontSize:"1.1rem" }}>{e.ar}</div>
                    <div className="ex-en">{e.en}</div>
                    <div className="ex-note">{e.note}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="col-card">
              <div className="col-card-header" style={{ background:"var(--teal)" }}>Existence — "There Is"</div>
              <div className="col-card-body">
                <div style={{ fontSize:".85rem",color:"var(--mgray)",marginBottom:".7rem" }}>Same structure: متعلق بالخبر (location) + مبتدأ مؤخر (the thing that exists)</div>
                {[
                  { ar:"فِي قُلُوبِهِمْ مَرَضٌ", en:"There is a disease in their hearts.", note:"In their hearts is a disease" },
                  { ar:"وَبَيْنَهُمَا حِجَابٌ", en:"And there is a barrier between the two of them.", note:"Between the two of them is a barrier" },
                  { ar:"فِيهِ آيَاتٌ بَيِّنَاتٌ", en:"In it are clear signs.", note:"متعلق بالخبر is مقدم because مبتدأ is common" },
                ].map(e => (
                  <div key={e.ar} className="ex-box" style={{ marginBottom:".6rem" }}>
                    <div className="ex-ar" style={{ fontSize:"1.1rem" }}>{e.ar}</div>
                    <div className="ex-en">{e.en}</div>
                    <div className="ex-note">{e.note}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </Slide>

        {/* ── 5.6 COMPLEX ── */}
        <Slide id="slide-complex">
          <div className="fade-in"><SectionTag>5.6 — Complex Sentences</SectionTag></div>
          <div className="fade-in"><SlideTitle>A Full Sentence Inside the خبر</SlideTitle></div>
          <div className="highlight-dark fade-in">
            The <strong style={{ color:"var(--gold)" }}>خبر</strong> bucket is special — it can hold an entire <strong style={{ color:"var(--gold)" }}>sentence</strong> (جملة اسمية or جملة فعلية) inside it.
          </div>
          <div className="two-col fade-in">
            <div className="col-card">
              <div className="col-card-header" style={{ background:"var(--navy)" }}>Sentence as خبر</div>
              <div className="col-card-body">
                <div style={{ fontSize:".87rem",color:"var(--mgray)",marginBottom:".8rem" }}>Two tiers of labeling: first label the outer sentence, then pull out the inner sentence inside the خبر and label it separately.</div>
                <div className="ex-box" style={{ marginBottom:".8rem" }}>
                  <div className="ex-ar">هَذَا هُوَ الحَقُّ</div>
                  <div className="ex-en">This — it IS the truth.</div>
                  <div className="ex-note">Outer: هَذَا = مبتدأ · هُوَ الحَقُّ = خبر (full sentence inside)<br/>Inner: هُوَ = مبتدأ · الحَقُّ = خبر</div>
                </div>
                <div className="ex-box">
                  <div className="ex-ar">إِنَّكَ أَنْتَ عَلَّامُ الغُيُوبِ</div>
                  <div className="ex-en">Certainly you — you ARE the Knower of the unseen.</div>
                  <div className="ex-note">Inner sentence: أَنْتَ = مبتدأ · عَلَّامُ الغُيُوبِ = خبر</div>
                </div>
              </div>
            </div>
            <div className="col-card">
              <div className="col-card-header" style={{ background:"var(--teal)" }}>Multiple خبر (Back-to-Back)</div>
              <div className="col-card-body">
                <div style={{ fontSize:".87rem",color:"var(--mgray)",marginBottom:".8rem" }}>A مبتدأ can have two or more خبر back-to-back with no حرف عطف. Most common with Allah's names.</div>
                <div className="ex-box" style={{ marginBottom:".7rem" }}>
                  <div className="ex-ar">وَاللَّهُ وَاسِعٌ عَلِيمٌ</div>
                  <div className="ex-en">And Allah is all-encompassing, all-knowing.</div>
                  <div className="ex-note">Two خبر: وَاسِعٌ and عَلِيمٌ — both in رفع</div>
                </div>
                <div className="ex-box">
                  <div className="ex-ar">وَرَبُّنَا الرَّحْمَنُ المُسْتَعَانُ</div>
                  <div className="ex-en">And our Master is the Merciful, the One relied upon.</div>
                  <div className="ex-note">Two خبر: الرَّحْمَنُ and المُسْتَعَانُ</div>
                </div>
                <div className="note-box" style={{ marginTop:".7rem" }}>
                  <strong>Referee Pronoun:</strong> To say "This IS the house" (with ال), add a matching pronoun:
                  <span className="arabic" style={{ color:"var(--gold)",marginLeft:".5rem" }}>هَذَا هُوَ البَيْتُ</span>
                </div>
              </div>
            </div>
          </div>
        </Slide>

        {/* ── FINAL RECAP ── */}
        <Slide id="slide-final" dark>
          <div className="fade-in">
            <div className="divider-slide" style={{ marginBottom:"1.5rem" }}>
              <div className="divider-ch">Chapters 1–5 Complete</div>
              <h2 className="slide-title" style={{ color:"var(--white)",textAlign:"center" }}>Master Summary</h2>
            </div>
          </div>
          {[
            { label:"Ch 1 — Word Types",   text:"3 types: اسم (noun/adj/adv) · فعل (has tense) · حرف (needs اسم or فعل after it)" },
            { label:"Ch 2 — الإعراب",       text:"3 statuses: رفع (doer) · نصب (detail) · جر (after-of). Shown by ending sounds or combinations. Heavy = default (tanwīn). Light = tanwīn removed. 3 flexibilities: fully, partly, non." },
            { label:"Ch 2 — Fragments",    text:"5 fragments: جار ومجرور · حرف نصب واسمها · إضافة · موصوف وصفة · اسم إشارة ومشار إليه. Plus حرف عطف (carries status)." },
            { label:"Ch 2 — Pronouns",     text:"Independent = always رفع. Attached = always نصب or جر. Attached to اسم → إضافة." },
            { label:"Ch 3 — Gender",       text:"Default = masculine. 6 feminine categories: biologically feminine · ends in ة/اء/ى · paired body parts · proper places · non-human plurals · sami'ī (Arabs said so)." },
            { label:"Ch 3 — Number/Type",  text:"4 plural types. Non-human plurals → singular feminine treatment. 7 معرفة categories: ال · proper name · pronoun · pointer · relative · called person · مضاف whose إليه is معرفة." },
            { label:"Ch 4 — Fragments",    text:"موصوف وصفة: adjective after noun, match all 4 properties. اسم إشارة: مشار إليه must have ال. Point at إضافة → put اسم إشارة AFTER." },
            { label:"Ch 5 — الجملة الاسمية", text:"3 parts: مبتدأ (before IS) · خبر (after IS, single اسم) · متعلق بالخبر (after IS, جار ومجرور). Invisible IS found by 'break in chain' rule. Abnormal: مقدم/مؤخر. HE HAS: لِـ + owner + item. THERE IS: location + item." },
          ].map(r => (
            <div key={r.label} className="recap-row fade-in">
              <div className="recap-row-label">{r.label}</div>
              <div className="recap-row-text">{r.text}</div>
            </div>
          ))}
          <div className="fade-in" style={{ borderTop:"1px solid rgba(201,147,59,.3)",marginTop:"1.5rem",paddingTop:"1rem",textAlign:"center",color:"rgba(255,255,255,.4)",fontStyle:"italic",fontSize:".85rem" }}>
            Next: Chapter 6 — الفعل الماضي (The Past-Tense Verb)
          </div>
        </Slide>

      </div>{/* end slides-wrapper */}

      <footer>
        Based on the <a href="#" rel="noopener">Bayyinah Dream Textbook</a> by Sumaya Al-Saadoon
        &nbsp;·&nbsp; Section 1: Nahw — The science of how words interact with each other
        &nbsp;·&nbsp; Chapters 1–5
      </footer>

      {showTop && (
        <button className="scroll-top" onClick={() => window.scrollTo({ top:0, behavior:"smooth" })} aria-label="Back to top">↑</button>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
