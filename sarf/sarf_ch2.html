<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bayyinah Dream — Sarf · Chapter 2 · الثلاثي المزيد فيه</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1A2744; --navy2: #22304A; --navy3: #1D2A3D;
      --gold: #C9933B; --gold2: #E8AD55;
      --cream: #F5F0E8; --cream2: #EDE7D8;
      --teal: #1D7A8C; --teal2: #258EA3;
      --white: #FFFFFF; --dgray: #2D2D2D; --mgray: #5A5A6A; --lgray: #E8E4DC;
      --green: #2E7D52; --purple: #6B3FA0; --red: #B94040; --orange: #C06820;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dgray); min-height: 100vh; }
    .ar { font-family: 'Noto Naskh Arabic', serif; direction: rtl; }

    #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--gold), var(--teal)); z-index: 1000; transition: width .2s ease; }

    nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(26,39,68,.97); backdrop-filter: blur(12px); z-index: 100; border-bottom: 1px solid rgba(201,147,59,.25); }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; height: 58px; }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); text-decoration: none; letter-spacing: .04em; white-space: nowrap; }
    .nav-logo span { color: var(--white); }
    .tag-s2 { font-size: .65rem; font-weight: 700; background: var(--teal); color: #fff; padding: .15rem .45rem; border-radius: 3px; margin-left: .4rem; letter-spacing: .05em; vertical-align: middle; }
    .nav-chapters { display: flex; gap: .15rem; align-items: center; overflow-x: auto; max-width: 78%; }
    .nav-btn { background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: .72rem; color: rgba(255,255,255,.5); padding: .3rem .6rem; border-radius: 4px; transition: all .2s; white-space: nowrap; }
    .nav-btn:hover { color: var(--gold); background: rgba(201,147,59,.1); }
    .nav-btn.active { color: var(--gold); background: rgba(201,147,59,.18); }
    .nav-counter { font-size: .7rem; color: rgba(255,255,255,.3); border-left: 1px solid rgba(255,255,255,.1); padding-left: .9rem; margin-left: .4rem; white-space: nowrap; }

    .slides-wrapper { padding-top: 58px; }
    .slide { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 5rem 2rem 4rem; position: relative; overflow: hidden; }
    .slide-inner { max-width: 1000px; margin: 0 auto; width: 100%; position: relative; z-index: 2; }
    .slide-dark { background: var(--navy); color: var(--white); }
    .slide-dark::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 80% 20%, rgba(29,122,140,.18) 0%, transparent 60%), radial-gradient(ellipse at 10% 80%, rgba(201,147,59,.1) 0%, transparent 50%); pointer-events: none; }
    .slide-light { background: var(--cream); color: var(--dgray); }
    .slide-light::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 90% 10%, rgba(29,122,140,.07) 0%, transparent 55%); pointer-events: none; }
    .slide-cream2 { background: var(--cream2); color: var(--dgray); }

    .gold-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--gold), var(--teal), var(--gold)); }
    .stag { display: inline-block; font-size: .7rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: .3rem .85rem; border-radius: 4px; margin-bottom: 1.2rem; }
    .stag-gold   { background: var(--gold);   color: var(--navy); }
    .stag-teal   { background: var(--teal);   color: #fff; }
    .stag-green  { background: var(--green);  color: #fff; }
    .stag-purple { background: var(--purple); color: #fff; }
    .stag-navy   { background: var(--navy);   color: #fff; }
    .stag-red    { background: var(--red);    color: #fff; }
    .stag-orange { background: var(--orange); color: #fff; }
    .stag-s2 { background: linear-gradient(135deg, var(--teal), var(--navy)); color: #fff; }

    .slide-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.9rem, 5vw, 3rem); font-weight: 700; line-height: 1.15; margin-bottom: 1.8rem; }
    .slide-dark .slide-title { color: var(--white); }
    .slide-light .slide-title, .slide-cream2 .slide-title { color: var(--navy); }

    /* HERO */
    .hero-bismillah { font-family: 'Noto Naskh Arabic', serif; font-size: clamp(1.4rem, 4vw, 2rem); color: var(--gold); text-align: center; margin-bottom: 1.5rem; direction: rtl; animation: fadeUp .8s ease both; }
    .hero-eyebrow { text-align: center; letter-spacing: .2em; font-size: .8rem; font-weight: 600; color: var(--teal); text-transform: uppercase; margin-bottom: .75rem; animation: fadeUp .8s .1s ease both; }
    .hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 7vw, 5rem); font-weight: 700; line-height: 1.05; color: var(--white); text-align: center; margin-bottom: 1rem; animation: fadeUp .8s .2s ease both; }
    .hero-sub { text-align: center; color: rgba(255,255,255,.6); font-size: 1.05rem; margin-bottom: .5rem; animation: fadeUp .8s .3s ease both; }
    .hero-divider { width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 1.5rem auto; animation: fadeUp .8s .4s ease both; }
    .hero-tagline { text-align: center; color: var(--gold); font-style: italic; font-size: .9rem; animation: fadeUp .8s .5s ease both; }
    .hero-credit { text-align: center; color: rgba(255,255,255,.3); font-size: .8rem; margin-top: 2.5rem; animation: fadeUp .8s .6s ease both; }

    /* HIGHLIGHT BOXES */
    .h-dark { background: var(--navy); color: var(--white); border-radius: 8px; padding: 1rem 1.3rem; font-size: .95rem; font-weight: 600; margin-bottom: 1.3rem; }
    .h-gold { background: var(--gold); color: var(--navy); border-radius: 8px; padding: 1rem 1.3rem; font-size: .95rem; font-weight: 600; margin-bottom: 1.3rem; }
    .h-teal { background: var(--teal); color: var(--white); border-radius: 8px; padding: 1rem 1.3rem; font-size: .95rem; font-weight: 600; margin-bottom: 1.3rem; }
    .note { background: var(--lgray); border-radius: 8px; padding: .9rem 1.2rem; font-size: .87rem; color: var(--navy); margin-top: 1.2rem; }
    .note strong { color: var(--gold); }
    .note-dk { background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); }

    /* LAYOUT */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media(max-width:680px) { .two-col { grid-template-columns: 1fr; } }
    .three-col { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
    @media(max-width:700px) { .three-col { grid-template-columns: 1fr; } }
    .card { background: var(--white); border: 1px solid var(--lgray); border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.05); }
    .card-h { padding: .85rem 1.2rem; color: var(--white); font-weight: 700; font-size: .82rem; letter-spacing: .04em; }
    .card-b { padding: 1rem 1.2rem; }

    /* SARF TABLE — main صرف صغير layout */
    .sarf-table-wrap { background: var(--navy); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.18); }
    .sarf-section-label { background: rgba(201,147,59,.15); border-bottom: 1px solid rgba(201,147,59,.25); padding: .4rem 1rem; font-size: .7rem; font-weight: 700; color: var(--gold); letter-spacing: .12em; text-transform: uppercase; display: flex; justify-content: space-between; }
    .sarf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-bottom: 1px solid rgba(255,255,255,.06); }
    .sarf-row:last-child { border-bottom: none; }
    .sarf-cell { padding: .6rem 1rem; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid rgba(255,255,255,.06); }
    .sarf-cell:last-child { border-right: none; }
    .sarf-ar { font-family: 'Noto Naskh Arabic', serif; font-size: 1.15rem; font-weight: 700; direction: rtl; margin-bottom: .12rem; }
    .sarf-label { font-size: .67rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: rgba(255,255,255,.35); }
    .sarf-label-extra { font-size: .65rem; color: rgba(255,255,255,.25); margin-top: .05rem; }
    .sarf-passive .sarf-ar { color: var(--teal2); }
    .sarf-active .sarf-ar { color: var(--gold2); }
    .sarf-derived .sarf-ar { color: #8dd5c0; }

    /* FEATURE BADGE STRIP */
    .feature-strip { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .fbadge { font-size: .75rem; font-weight: 700; padding: .3rem .75rem; border-radius: 5px; font-family: 'DM Sans', sans-serif; }

    /* FAMILY HEADER CARD */
    .fam-header { border-radius: 12px; overflow: hidden; margin-bottom: 1.3rem; }
    .fam-header-top { padding: 1.1rem 1.5rem .8rem; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: .5rem; }
    .fam-name-ar { font-family: 'Noto Naskh Arabic', serif; font-size: 2.2rem; font-weight: 700; color: var(--white); direction: rtl; line-height: 1; }
    .fam-name-classical { font-family: 'Noto Naskh Arabic', serif; font-size: 1rem; color: rgba(255,255,255,.65); direction: rtl; margin-top: .25rem; }
    .fam-bottom { background: rgba(0,0,0,.2); padding: .6rem 1.5rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .fam-sample { font-size: .8rem; color: rgba(255,255,255,.6); }
    .fam-sample strong { color: rgba(255,255,255,.9); }

    /* RHETORICAL BOX */
    .rhet-box { background: var(--cream); border: 1px solid var(--lgray); border-radius: 8px; padding: .9rem 1.1rem; margin-top: .8rem; border-left: 4px solid var(--gold); }
    .rhet-title { font-size: .7rem; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .4rem; }
    .rhet-text { font-size: .87rem; color: var(--dgray); line-height: 1.6; }
    .rhet-ex { font-family: 'Noto Naskh Arabic', serif; font-size: 1rem; color: var(--gold); direction: rtl; margin-top: .4rem; }

    /* RECOGNITION FLOWCHART */
    .flow-node { border-radius: 8px; padding: .75rem 1rem; margin-bottom: .7rem; }
    .flow-q { background: var(--navy); border: 1px solid rgba(201,147,59,.3); }
    .flow-q-text { font-weight: 700; font-size: .88rem; color: var(--white); margin-bottom: .4rem; }
    .flow-answers { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .4rem; }
    .flow-a { background: rgba(255,255,255,.08); border-radius: 5px; padding: .3rem .7rem; font-size: .8rem; color: rgba(255,255,255,.75); }
    .flow-a strong { color: var(--gold); }

    /* SUMMARY TABLE */
    .summ-tbl { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
    .summ-tbl th { background: var(--gold); color: var(--navy); font-size: .76rem; font-weight: 700; padding: .6rem .8rem; text-align: left; }
    .summ-tbl td { padding: .55rem .8rem; font-size: .84rem; border-bottom: 1px solid var(--lgray); vertical-align: middle; }
    .summ-tbl tr:nth-child(even) td { background: rgba(232,228,220,.4); }
    .summ-tbl tr:last-child td { border-bottom: none; }
    .summ-tbl .td-ar { font-family: 'Noto Naskh Arabic', serif; font-size: 1.05rem; color: var(--gold); }
    .summ-tbl .td-root { font-family: 'Noto Naskh Arabic', serif; font-size: .95rem; color: var(--teal); }

    /* STEP */
    .step { display: flex; gap: 1rem; align-items: flex-start; padding: .75rem 1rem; background: var(--white); border: 1px solid var(--lgray); border-radius: 8px; margin-bottom: .6rem; }
    .step-n { background: var(--teal); color: var(--white); width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .78rem; font-weight: 700; flex-shrink: 0; }

    /* AGENDA CARD */
    .agenda-card { display: flex; align-items: center; gap: 1rem; background: var(--white); border: 1px solid var(--lgray); border-radius: 10px; padding: .85rem 1.3rem; margin-bottom: .8rem; box-shadow: 0 2px 10px rgba(0,0,0,.05); transition: transform .18s; }
    .agenda-card:hover { transform: translateX(3px); }
    .agenda-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .85rem; color: var(--white); flex-shrink: 0; }

    /* RECAP */
    .recap-row { display: flex; gap: 1rem; align-items: flex-start; background: rgba(255,255,255,.07); border: 1px solid rgba(201,147,59,.25); border-radius: 8px; padding: .9rem 1.2rem; margin-bottom: .75rem; }
    .recap-lbl { font-size: .73rem; font-weight: 700; color: var(--gold); white-space: nowrap; padding-top: .1rem; min-width: 90px; }
    .recap-txt { font-size: .88rem; color: rgba(255,255,255,.85); line-height: 1.55; }

    .divider-ch { font-size: .78rem; font-weight: 700; color: var(--gold); letter-spacing: .2em; text-transform: uppercase; margin-bottom: .5rem; text-align: center; }
    .divider-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 700; color: var(--white); margin-bottom: .4rem; text-align: center; }
    .divider-sub { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.1rem, 3vw, 1.7rem); color: rgba(255,255,255,.55); margin-bottom: 1.5rem; text-align: center; }
    .divider-hr { width: 80px; height: 1.5px; background: var(--gold); margin: 0 auto 1.2rem; }

    footer { background: var(--navy); color: rgba(255,255,255,.35); text-align: center; padding: 1.8rem; font-size: .78rem; border-top: 1px solid rgba(201,147,59,.2); }
    footer a { color: var(--gold); text-decoration: none; }
    .scroll-top { position: fixed; bottom: 1.5rem; right: 1.5rem; width: 40px; height: 40px; border-radius: 50%; background: var(--gold); color: var(--navy); border: none; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(0,0,0,.2); transition: transform .2s; z-index: 99; }
    .scroll-top:hover { transform: translateY(-2px); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .fi { opacity: 0; transform: translateY(20px); transition: opacity .6s ease, transform .6s ease; }
    .fi.visible { opacity: 1; transform: translateY(0); }
    @media(max-width:768px) { .nav-chapters { display: none; } .slide { padding: 4.5rem 1.2rem 3rem; } }
  </style>
</head>
<body>
<div id="progress-bar"></div>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const NAV = [
  { label: "Intro",        id: "s-intro" },
  { label: "Overview",     id: "s-overview" },
  { label: "صرف صغير",    id: "s-sarf-template" },
  { label: "Family II",    id: "s-f2" },
  { label: "Family III",   id: "s-f3" },
  { label: "Family IV",    id: "s-f4" },
  { label: "Family V",     id: "s-f5" },
  { label: "Family VI",    id: "s-f6" },
  { label: "Family VII",   id: "s-f7" },
  { label: "Family VIII",  id: "s-f8" },
  { label: "Family IX",    id: "s-f9" },
  { label: "Family X",     id: "s-f10" },
  { label: "Recognition",  id: "s-recog" },
  { label: "Summary",      id: "s-summary" },
];

function useScrollProgress() {
  const [p, setP] = useState(0);
  useEffect(() => {
    const fn = () => { const el = document.documentElement; const s = el.scrollTop || document.body.scrollTop; const t = el.scrollHeight - el.clientHeight; setP(t > 0 ? (s / t) * 100 : 0); };
    window.addEventListener("scroll", fn, { passive: true }); return () => window.removeEventListener("scroll", fn);
  }, []);
  return p;
}
function useActiveSection(ids) {
  const [active, setActive] = useState(ids[0]);
  useEffect(() => {
    const obs = new IntersectionObserver(entries => entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); }), { threshold: .35 });
    ids.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); }); return () => obs.disconnect();
  }, [ids]); return active;
}
function useFadeIn() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible"); }), { threshold: .12 });
    document.querySelectorAll(".fi").forEach(el => obs.observe(el)); return () => obs.disconnect();
  }, []);
}
function useShowTop() {
  const [show, setShow] = useState(false);
  useEffect(() => { const fn = () => setShow(window.scrollY > 400); window.addEventListener("scroll", fn, { passive: true }); return () => window.removeEventListener("scroll", fn); }, []);
  return show;
}

const Tag = ({ children, color = "gold" }) => <span className={`stag stag-${color}`}>{children}</span>;
const Title = ({ children }) => <h2 className="slide-title">{children}</h2>;
function Slide({ id, dark, cream2, children }) {
  const cls = dark ? "slide slide-dark" : cream2 ? "slide slide-cream2" : "slide slide-light";
  return <section className={cls} id={id}>{!dark && <div className="gold-bar" />}<div className="slide-inner">{children}</div></section>;
}

/* ── SARF SMALL TABLE component ── */
function SarfTable({ data, color }) {
  const rows = [
    { label: "فعل ماضي",   subLabel: "active past",        ar: data.madhi,      cls: "sarf-active" },
    { label: "فعل مضارع",  subLabel: "active present",     ar: data.mudar,      cls: "sarf-active" },
    { label: "مصدر",       subLabel: "verbal noun",         ar: data.masdar,     cls: "sarf-active" },
    { label: "اسم فاعل",   subLabel: "active participle",   ar: data.ismFail,    cls: "sarf-active" },
    { label: "ماضي مجهول", subLabel: "passive past",        ar: data.madhi_p,    cls: "sarf-passive" },
    { label: "مضارع مجهول",subLabel: "passive present",     ar: data.mudar_p,    cls: "sarf-passive" },
    { label: "اسم مفعول",  subLabel: "passive participle",  ar: data.ismMafool,  cls: "sarf-passive" },
    { label: "فعل أمر",    subLabel: "command",             ar: data.amr,        cls: "sarf-derived" },
    { label: "فعل نهي",    subLabel: "forbidding",          ar: data.nahi,       cls: "sarf-derived" },
    { label: "اسم ظرف",    subLabel: "time/place name",     ar: data.zarf,       cls: "sarf-derived" },
  ];
  const half1 = rows.slice(0, 5);
  const half2 = rows.slice(5, 10);
  return (
    <div className="sarf-table-wrap">
      <div className="sarf-section-label">
        <span>Active Side — المعلوم</span>
        <span>Passive &amp; Derived — المجهول والمشتق</span>
      </div>
      {half1.map((r, i) => (
        <div key={i} className="sarf-row">
          <div className={`sarf-cell sarf-active`}>
            <span className="sarf-ar" style={{ color: "var(--gold2)" }}>{r.ar}</span>
            <span className="sarf-label">{r.label}</span>
            <span className="sarf-label-extra">{r.subLabel}</span>
          </div>
          <div className={`sarf-cell ${half2[i].cls}`}>
            <span className="sarf-ar" style={{ color: half2[i].cls === "sarf-passive" ? "var(--teal2)" : "#8dd5c0" }}>{half2[i].ar}</span>
            <span className="sarf-label">{half2[i].label}</span>
            <span className="sarf-label-extra">{half2[i].subLabel}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── FAMILY DATA ── */
const FAMILIES = {
  f2: {
    num: "II", classical: "بَابُ تَفْعِيل", color: "#C9933B",
    root: "ع · ل · م", sampleMeaning: "to teach",
    features: ["شدة on عين الكلمة", "ضمة on مضارع"],
    classification: "شدة family + ضمة family",
    data: {
      madhi: "عَلَّمَ", mudar: "يُعَلِّمُ", masdar: "تَعْلِيمًا",
      ismFail: "مُعَلِّمٌ", madhi_p: "عُلِّمَ", mudar_p: "يُعَلَّمُ",
      ismMafool: "مُعَلَّمٌ", amr: "عَلِّمْ", nahi: "لَا تُعَلِّمْ", zarf: "مُعَلَّمٌ",
    },
    placeholder: {
