  <style>

    .compare-card-roman { font-family: 'Cormorant Garamond', serif; font-size: .9rem; font-weight: 600; letter-spacing: .12em; color: rgba(255,255,255,.7); text-transform: uppercase; margin-top: .25rem; }

    .family-chip { background: var(--white); border: 1px solid var(--lgray); border-radius: 8px; padding: .6rem .5rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.04); }

    .family-chip-name { font-size: .72rem; font-weight: 700; color: var(--navy); }

    /* CONTAINER VISUAL */
    .container-visual { background: rgba(255,255,255,.08); border: 1px solid rgba(201,147,59,.3); border-radius: 10px; padding: 1.2rem; margin-bottom: .8rem; }
    .container-visual-top { display: flex; gap: .8rem; align-items: center; margin-bottom: .5rem; flex-wrap: wrap; }
    .cv-badge { font-size: .7rem; font-weight: 700; padding: .25rem .6rem; border-radius: 4px; }
    .cv-ar { font-family: 'Noto Naskh Arabic', serif; font-size: 1.2rem; font-weight: 700; color: var(--gold2); direction: rtl; }

    .cv-note { font-size: .8rem; color: rgba(255,255,255,.55); margin-top: .3rem; }

    /* RECAP ROWS */
    .recap-row { display: flex; gap: 1rem; align-items: flex-start; background: rgba(255,255,255,.07); border: 1px solid rgba(201,147,59,.25); border-radius: 8px; padding: .95rem 1.2rem; margin-bottom: .8rem; }
    .recap-row-label { font-size: .74rem; font-weight: 700; color: var(--gold); white-space: nowrap; padding-top: .1rem; min-width: 110px; }

<body>
<div id="progress-bar"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const NAV_LINKS = [
  { label: "Intro",         id: "slide-intro" },
  { label: "Overview",      id: "slide-overview" },
  { label: "1.1 What is Sarf?", id: "slide-what" },
  { label: "1.2 جامد vs مشتق", id: "slide-jamid" },
  { label: "1.3 Contents",  id: "slide-contents" },
  { label: "Root Letters",  id: "slide-roots" },
  { label: "1.3 Container", id: "slide-container" },
  { label: "Family Members",id: "slide-members" },
  { label: "أفعال Members", id: "slide-af3al" },
  { label: "أسماء Members", id: "slide-asma" },
  { label: "1.4 Families",  id: "slide-families" },
  { label: "مجرد",          id: "slide-mujarrad" },
  { label: "مزيد فيه",     id: "slide-mazid" },
  { label: "10 Families",   id: "slide-tenfam" },
  { label: "Summary",       id: "slide-summary" },
];

function useScrollProgress() {
  const [p, setP] = useState(0);
  useEffect(() => {
    const fn = () => { const el = document.documentElement; const s = el.scrollTop || document.body.scrollTop; const t = el.scrollHeight - el.clientHeight; setP(t > 0 ? (s/t)*100 : 0); };
    window.addEventListener("scroll", fn, { passive: true });
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return p;
}
function useActiveSection(ids) {
  const [active, setActive] = useState(ids[0]);
  useEffect(() => {
    const obs = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting) setActive(e.target.id); }), { threshold: .35 });
    ids.forEach(id => { const el = document.getElementById(id); if(el) obs.observe(el); });
    return () => obs.disconnect();
  }, [ids]);
  return active;
}
function useFadeIn() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add("visible"); }), { threshold: .12 });
    document.querySelectorAll(".fade-in").forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}
function useShowTop() {
  const [show, setShow] = useState(false);
  useEffect(() => { const fn = () => setShow(window.scrollY > 400); window.addEventListener("scroll", fn, { passive: true }); return () => window.removeEventListener("scroll", fn); }, []);
  return show;
}

const STag = ({ children, color }) => <span className={`section-tag${color ? " section-tag-"+color : ""}`}>{children}</span>;
const STitle = ({ children }) => <h2 className="slide-title">{children}</h2>;

function Slide({ id, dark, cream2, children }) {
  const cls = dark ? "slide slide-dark" : cream2 ? "slide slide-cream2" : "slide slide-light";
  return (
    <section className={cls} id={id}>
      {!dark && <div className="gold-bar" />}
      <div className="slide-inner">{children}</div>
    </section>
  );
}

const FAMILY_MEMBERS = [
  { num: 1, label: "الفِعْلُ الْمَاضِي",              example: "عَلَّمَ",   meaning: "he taught",              type: "فعل", typecol: "#C9933B" },
  { num: 2, label: "الفِعْلُ الْمُضَارِع",             example: "يُعَلِّمُ",  meaning: "he teaches",             type: "فعل", typecol: "#C9933B" },
  { num: 3, label: "الْمَاضِي الْمَبْنِيُّ لِلْمَجْهُول", example: "عُلِّمَ",   meaning: "he was taught",          type: "فعل", typecol: "#C9933B" },

    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
