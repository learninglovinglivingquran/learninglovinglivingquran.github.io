<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#1A2744;--navy2:#22304A;

      --cream:#F5F0E8;--lgray:#E8E4DC;

      --white:#fff;--dgray:#2D2D2D;--mgray:#5A5A6A;
      --green:#2E7D52;--purple:#6B3FA0;--red:#B94040;

    html{scroll-behavior:smooth}

    .arabic{font-family:'Noto Naskh Arabic',serif;direction:rtl}

    nav{position:fixed;top:0;left:0;right:0;background:rgba(26,39,68,.97);backdrop-filter:blur(12px);z-index:100;border-bottom:1px solid rgba(201,147,59,.25)}
    .nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:58px}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--gold);text-decoration:none;letter-spacing:.04em}
    .nav-logo span{color:var(--white)}
    .nav-chapters{display:flex;gap:.15rem;align-items:center;overflow-x:auto;max-width:80%}
    .nav-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.72rem;color:rgba(255,255,255,.5);padding:.3rem .6rem;border-radius:4px;transition:all .2s;white-space:nowrap}
    .nav-btn:hover{color:var(--gold);background:rgba(201,147,59,.1)}

    .slides-wrapper{padding-top:58px}

    .slide-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,5vw,3rem);font-weight:700;line-height:1.15;margin-bottom:1.8rem}

    .hero-bismillah{font-family:'Noto Naskh Arabic',serif;font-size:clamp(1.4rem,4vw,2rem);color:var(--gold);text-align:center;margin-bottom:1.5rem;direction:rtl;animation:fadeUp .8s ease both}
    .hero-eyebrow{text-align:center;letter-spacing:.2em;font-size:.8rem;font-weight:600;color:var(--teal);text-transform:uppercase;margin-bottom:.75rem;animation:fadeUp .8s .1s ease both}
    .hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,8vw,5.5rem);font-weight:700;line-height:1.05;color:var(--white);text-align:center;margin-bottom:1rem;animation:fadeUp .8s .2s ease both}
    .hero-sub{text-align:center;color:rgba(255,255,255,.6);font-size:1.05rem;margin-bottom:.5rem;animation:fadeUp .8s .3s ease both}

    .hero-tagline{text-align:center;color:var(--gold);font-style:italic;font-size:.9rem;animation:fadeUp .8s .5s ease both}

    .agenda-card{display:flex;align-items:center;gap:1.2rem;background:var(--white);border:1px solid var(--lgray);border-radius:10px;padding:1rem 1.4rem;margin-bottom:.9rem;box-shadow:0 2px 12px rgba(0,0,0,.05);transition:transform .2s,box-shadow .2s}

    .agenda-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem;color:var(--white);flex-shrink:0}

    .agenda-card-desc{font-size:.88rem;color:var(--mgray)}

    .data-table{width:100%;border-collapse:collapse;margin-top:.5rem}
    .data-table th{background:var(--navy);color:var(--white);font-size:.77rem;font-weight:600;letter-spacing:.04em;padding:.6rem .9rem;text-align:left}
    .data-table td{padding:.55rem .9rem;font-size:.88rem;border-bottom:1px solid var(--lgray)}
    .data-table tr:nth-child(even) td{background:rgba(232,228,220,.4)}
    .data-table tr:last-child td{border-bottom:none}
    .td-arabic{font-family:'Noto Naskh Arabic',serif;font-size:1.1rem;font-weight:600;color:var(--gold);text-align:center}
    .dark-table{width:100%;border-collapse:collapse;border-radius:8px;overflow:hidden}
    .dark-table th{background:var(--gold);color:var(--navy);font-size:.77rem;font-weight:700;letter-spacing:.05em;padding:.65rem 1rem;text-align:left}
    .dark-table td{padding:.65rem 1rem;font-size:.88rem;border-bottom:1px solid rgba(255,255,255,.06);color:var(--white)}

    .highlight-teal{background:var(--teal);color:var(--white);border-radius:8px;padding:1rem 1.3rem;font-size:.95rem;font-weight:600;margin-bottom:1.3rem}

    @media(max-width:700px){.three-col{grid-template-columns:1fr}}

    .col-card-header{padding:.85rem 1.2rem;color:var(--white);font-weight:700;font-size:.82rem;letter-spacing:.04em}
    .col-card-body{padding:1rem 1.2rem}

    .step-item{display:flex;gap:1rem;align-items:flex-start;padding:.8rem 1.1rem;background:var(--white);border:1px solid var(--lgray);border-radius:8px;margin-bottom:.7rem;font-size:.9rem;color:var(--dgray)}

    .cat-num{background:var(--gold);color:var(--navy);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;margin-top:1px}

    .recap-row{display:flex;gap:1rem;align-items:flex-start;background:rgba(255,255,255,.07);border:1px solid rgba(201,147,59,.25);border-radius:8px;padding:.95rem 1.2rem;margin-bottom:.8rem}

    .divider-slide{text-align:center}
    .divider-ch{font-size:.78rem;font-weight:700;color:var(--gold);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.5rem}
    .divider-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,7vw,4.5rem);font-weight:700;color:var(--white);margin-bottom:.4rem}

    .harf-ar{font-family:'Noto Naskh Arabic',serif;font-size:1.1rem;font-weight:700;color:var(--gold);direction:rtl}

    /* VERB CHART TABLE */
    .verb-chart{width:100%;border-collapse:collapse;border-radius:8px;overflow:hidden;font-size:.82rem}
    .verb-chart th{background:var(--gold);color:var(--navy);padding:.55rem .7rem;text-align:center;font-weight:700;font-size:.75rem}

    .vc-en{font-size:.78rem;color:rgba(255,255,255,.55);margin-top:.15rem}
    .vc-label{font-size:.75rem;color:rgba(255,255,255,.45);text-align:left}

    /* PROCESS STEPS */
    .process-steps{display:flex;flex-direction:column;gap:.6rem}
    .process-step{display:flex;gap:1rem;align-items:flex-start;padding:.85rem 1.1rem;background:rgba(255,255,255,.06);border:1px solid rgba(201,147,59,.25);border-radius:8px}
    .process-step-num{background:var(--gold);color:var(--navy);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}

    /* COMPARISON TABLE */
    .compare-table{width:100%;border-collapse:collapse;border-radius:8px;overflow:hidden}
    .compare-table th{padding:.65rem 1rem;font-size:.8rem;font-weight:700;text-align:left}
    .compare-table td{padding:.6rem 1rem;font-size:.85rem;border-bottom:1px solid var(--lgray)}
    .compare-table tr:last-child td{border-bottom:none}

    /* PILL TAGS */
    .pill{display:inline-block;font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:4px;margin:.15rem}
    .pill-gold{background:var(--gold);color:var(--navy)}
    .pill-teal{background:var(--teal);color:#fff}
    .pill-navy{background:var(--navy);color:#fff}
    .pill-green{background:var(--green);color:#fff}
    .pill-red{background:var(--red);color:#fff}

    /* MAFOOL CARDS */
    .mafool-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    @media(max-width:620px){.mafool-grid{grid-template-columns:1fr}}
    .mafool-card{border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07)}
    .mafool-card-top{height:5px}
    .mafool-card-body{background:var(--white);padding:1rem 1.1rem;border:1px solid var(--lgray);border-top:none}
    .mafool-card-title{font-family:'Noto Naskh Arabic',serif;font-size:1rem;font-weight:700;color:var(--navy);direction:rtl;margin-bottom:.2rem}
    .mafool-card-q{font-size:.78rem;font-weight:600;color:var(--teal);margin-bottom:.4rem}
    .mafool-card-desc{font-size:.83rem;color:var(--mgray);line-height:1.5;margin-bottom:.4rem}
    .mafool-card-ex{font-family:'Noto Naskh Arabic',serif;font-size:.95rem;color:var(--gold);direction:rtl}
    .mafool-card-ex-en{font-size:.78rem;color:var(--mgray);font-style:italic}

    /* LIGHT/LIGHTEST BUILD */
    .build-flow{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;background:rgba(255,255,255,.06);border:1px solid rgba(201,147,59,.25);border-radius:8px;padding:.9rem 1.1rem;margin-bottom:.7rem}
    .build-step{text-align:center;flex:1;min-width:90px}
    .build-step-ar{font-family:'Noto Naskh Arabic',serif;font-size:1.2rem;font-weight:700;color:var(--gold);direction:rtl}
    .build-step-label{font-size:.7rem;color:rgba(255,255,255,.45);margin-top:.15rem}
    .build-arrow{color:rgba(201,147,59,.5);font-size:1.2rem}

    /* SENT STRUCTURE */
    .sent-structure{background:var(--navy);border-radius:10px;padding:1.2rem;display:flex;gap:.8rem;align-items:stretch;flex-wrap:wrap}
    .sent-part{flex:1;min-width:140px;background:rgba(255,255,255,.07);border:1px solid rgba(201,147,59,.3);border-radius:8px;padding:.9rem 1rem;text-align:center}
    .sent-part-label{font-size:.72rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem}
    .sent-part-ar{font-family:'Noto Naskh Arabic',serif;font-size:1.1rem;color:var(--white);direction:rtl}
    .sent-part-en{font-size:.78rem;color:rgba(255,255,255,.55);margin-top:.2rem}

    footer{background:var(--navy);color:rgba(255,255,255,.35);text-align:center;padding:1.8rem;font-size:.78rem;border-top:1px solid rgba(201,147,59,.2)}
    footer a{color:var(--gold);text-decoration:none}
    .scroll-top{position:fixed;bottom:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;background:var(--gold);color:var(--navy);border:none;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.2);transition:opacity .3s,transform .2s;z-index:99}
    .scroll-top:hover{transform:translateY(-2px)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
    .fade-in.visible{opacity:1;transform:translateY(0)}

    @media(max-width:768px){.nav-chapters{display:none}.slide{padding:4.5rem 1.2rem 3rem}}
  </style>
</head>
<body>
<div id="progress-bar"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const NAV = [
  { label:"Intro",           id:"s-intro" },
  { label:"Ch 6",            id:"s-ch6" },
  { label:"الفعل Types",     id:"s-ftype" },
  { label:"الماضي Chart",    id:"s-madhi" },
  { label:"الفاعل",          id:"s-faiil" },
  { label:"المفعول",         id:"s-mafool" },
  { label:"مفعول به",        id:"s-mf1" },
  { label:"مفعول فيه",       id:"s-mf2" },
  { label:"مفعول له",        id:"s-mf3" },
  { label:"مفعول مطلق",     id:"s-mf4" },
  { label:"الحال",           id:"s-mf5" },
  { label:"Abnormal/Complex", id:"s-jabnorm" },
  { label:"Q. Words",        id:"s-qwords" },
  { label:"Ch 7",            id:"s-ch7" },
  { label:"المضارع Chart",   id:"s-mudar" },
  { label:"Light Form",      id:"s-light" },
  { label:"Lightest Form",   id:"s-lightest" },
  { label:"Commanding",      id:"s-amr" },
  { label:"Forbidding",      id:"s-nahi" },
  { label:"نون التوكيد",     id:"s-noon" },
  { label:"اسم vs فعل",     id:"s-isvf" },
  { label:"Ch 8",            id:"s-ch8" },
  { label:"Passive Intro",   id:"s-pass" },
  { label:"ماضي Passive",   id:"s-passm" },
  { label:"مضارع Passive",  id:"s-passp" },
  { label:"نائب الفاعل",    id:"s-naib" },
  { label:"Rhetorical",      id:"s-rhet" },
  { label:"Transitivity",    id:"s-trans" },
  { label:"Final Recap",     id:"s-final" },
];

function useScrollProgress() {
  const [p, setP] = useState(0);
  useEffect(() => {
    const fn = () => {
      const el = document.documentElement;
      const s = el.scrollTop || document.body.scrollTop;
      const t = el.scrollHeight - el.clientHeight;
      setP(t > 0 ? (s/t)*100 : 0);
    };
    window.addEventListener("scroll", fn, { passive:true });
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return p;
}

function useActiveSection(ids) {
  const [active, setActive] = useState(ids[0]);
  useEffect(() => {
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if(e.isIntersecting) setActive(e.target.id); }),
      { threshold:.35 }
    );
    ids.forEach(id => { const el = document.getElementById(id); if(el) obs.observe(el); });
    return () => obs.disconnect();
  }, [ids]);
  return active;
}

function useFadeIn() {
  useEffect(() => {
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add("visible"); }),
      { threshold:.12 }
    );
    document.querySelectorAll(".fade-in").forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function useShowTop() {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const fn = () => setShow(window.scrollY > 400);
    window.addEventListener("scroll", fn, { passive:true });
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return show;
}

const SectionTag = ({ children, color }) => (
  <span className={`section-tag${color ? " section-tag-"+color : ""}`}>{children}</span>
);
const SlideTitle = ({ children }) => <h2 className="slide-title">{children}</h2>;

function Slide({ id, dark, children }) {
  return (
    <section className={dark ? "slide slide-dark" : "slide slide-light"} id={id}>
      {!dark && <div className="gold-bar" />}
      <div className="slide-inner">{children}</div>
    </section>
  );
}

/* ── PAST TENSE CHART DATA ── */
const MADHI_CHART = [
  ["هو",  "نَصَرَ",    "He helped",          "3rd m.sg"],
  ["هم",  "نَصَرُوا",  "They helped",        "3rd m.pl"],

                  { ar:"أُنْزِلَتْ سُورَةٌ",    en:"A surah was sent down.",           note:"سُورَةٌ = outside نائب الفاعل (feminine → هي form)" },
                  { ar:"يُرْزَقُونَ فِيهَا",     en:"They are given provisions in it.", note:"هم inside نائب الفاعل" },
                  { ar:"أُعِدَّتْ لِلْمُتَّقِينَ", en:"It was prepared for the God-conscious.", note:"هي inside نائب الفاعل" },
                ].map(e => (
                  <div key={e.ar} className="ex-box" style={{ marginBottom:".6rem" }}>
                    <div className="ex-ar" style={{ fontSize:"1.1rem" }}>{e.ar}</div>
                    <div className="ex-en">{e.en}</div>
                    <div className="ex-note">{e.note}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </Slide>

        {/* 8.3 RHETORICAL */}
        <Slide id="s-rhet">
          <div className="fade-in"><SectionTag>8.3 — Rhetorical Benefits</SectionTag></div>
          <div className="fade-in"><SlideTitle>Why Use the Passive? Three Reasons</SlideTitle></div>
          <div className="highlight-dark fade-in">
            Every passive has an active alternative. Choosing the passive shifts focus to the <strong style={{ color:"var(--gold)" }}>action or the نائب الفاعل</strong> — the doer is deliberately omitted. Three reasons:
          </div>
          <div className="cat-list fade-in">
            {[
              {
                n:1, title:"No need to mention the doer",
                desc:"The command or action applies regardless of who performs it.",
                ex:"إِذَا سَمِعْتُمْ آيَاتِ اللَّهِ يُكْفَرُ بِهَا",
                en:"If you hear the signs of Allah being disbelieved in… — who does the disbelieving is irrelevant to the command.",
              },
              {
                n:2, title:"Out of respect for Allah",
                desc:"When evil is mentioned, passive is used (doer unspecified). When good is mentioned, active is used (Allah named). Jinn associate Allah's name only with good.",
                ex:"وَأَنَّا لَا نَدْرِي أَشَرٌّ أُرِيدَ بِمَنْ فِي الأَرْضِ أَمْ أَرَادَ بِهِمْ رَبُّهُمْ رَشَدًا",
                en:"We don't know if evil is intended for those on earth, or if their Master intends guidance for them.",
              },
              {
                n:3, title:"Expanding the scope of the action",
                desc:"Specifying the فاعل restricts it. Not specifying leaves it open and unlimited — ALL may be included.",
                ex:"لُعِنُوا فِي الدُّنْيَا وَالآخِرَةِ",
                en:"They were cursed in this world and the next. (Who cursed them? Everyone and everything — not just Allah.)",
              },
            ].map(c => (
              <div key={c.n} className="cat-item">
                <div className="cat-num">{c.n}</div>
                <div>
                  <div className="cat-title">{c.title}</div>
                  <div className="cat-desc">{c.desc}</div>
                  <div className="ex-ar" style={{ fontSize:"1rem",marginTop:".4rem" }}>{c.ex}</div>
                  <div style={{ fontSize:".8rem",color:"var(--mgray)",fontStyle:"italic",marginTop:".2rem" }}>{c.en}</div>
                </div>
              </div>
            ))}
          </div>
        </Slide>

        {/* 8.4 TRANSITIVITY */}
        <Slide id="s-trans" dark>
          <div className="fade-in"><SectionTag>8.4 — Transitivity</SectionTag></div>
          <div className="fade-in"><SlideTitle>فعل لازم · فعل متعدٍّ · متعدٍّ لمفعولين</SlideTitle></div>
          <div className="highlight-gold fade-in">
            Only a <strong>transitive فعل</strong> (one that can take a مفعول به) can be made passive. Why? Because the مفعول به becomes the نائب الفاعل — if there's no مفعول به, there's no نائب الفاعل for the passive.
          </div>
          <div className="three-col fade-in">
            {[
              {
                title:"فعل لازم", sub:"Intransitive", color:"var(--red)", badge:"CANNOT be passive",
                desc:"The action only affects the فاعل — it cannot affect anything external.",
                test:"I [verb] something/someone → DOESN'T MAKE SENSE",
                ex:"to sleep · to fall · to laugh · to cry · to sit",
              },
              {
                title:"فعل متعدٍّ", sub:"Transitive", color:"var(--green)", badge:"CAN be passive",
                desc:"The action affects something else or someone else.",
                test:"I [verb] something/someone → MAKES SENSE",
                ex:"to read · to write · to eat · to carry · to worship",
              },
              {
                title:"متعدٍّ لمفعولين", sub:"Double-Object", color:"var(--gold)", badge:"Passive + مفعول به",
                desc:"Takes TWO مفعول به. In passive form: one becomes نائب الفاعل, the other remains مفعول به.",
                test:"Special: عَلَّمَ · أَعْطَى · جَعَلَ · رَأَى · ظَنَّ",
                ex:"عَلَّمَهُ البَيَانَ — He taught him language → passive keeps one مفعول به",
              },
            ].map(t => (
              <div key={t.title} className="col-card">
                <div className="col-card-header" style={{ background:t.color,color:t.color==="var(--gold)"?"var(--navy)":"#fff" }}>
                  <span className="arabic" style={{ fontSize:".95rem" }}>{t.title}</span><br/>
                  <span style={{ fontSize:".72rem",fontWeight:400 }}>{t.sub}</span>
                </div>
                <div className="col-card-body">
                  <div style={{ display:"inline-block",background:t.color==="var(--red)"?"rgba(185,64,64,.15)":t.color==="var(--green)"?"rgba(46,125,82,.15)":"rgba(201,147,59,.15)",border:`1px solid ${t.color}`,borderRadius:"4px",padding:".2rem .6rem",fontSize:".72rem",fontWeight:700,color:t.color,marginBottom:".6rem" }}>{t.badge}</div>
                  <div style={{ fontSize:".83rem",color:"var(--mgray)",marginBottom:".5rem" }}>{t.desc}</div>
                  <div style={{ fontSize:".78rem",color:"var(--teal)",marginBottom:".4rem",fontStyle:"italic" }}>{t.test}</div>
                  <div style={{ fontSize:".8rem",color:"var(--navy)" }}>{t.ex}</div>
                </div>
              </div>
            ))}
          </div>
          <div className="note-box fade-in" style={{ marginTop:"1.2rem" }}>
            <strong>Test for لازم:</strong> Put "something" or "someone" as a placeholder مفعول به. If the sentence still doesn't make sense, or requires a حرف, the فعل is لازم. E.g. "I fell something" ✗ → لازم. "I read something" ✓ → متعدٍّ.
          </div>
        </Slide>

        {/* FINAL RECAP */}
        <Slide id="s-final" dark>
          <div className="fade-in">
            <div className="divider-slide" style={{ marginBottom:"1.5rem" }}>
              <div className="divider-ch">Chapters 6–8 Complete</div>
              <h2 className="slide-title" style={{ color:"white",textAlign:"center" }}>Master Summary</h2>
            </div>
          </div>
          {[
            { label:"الجملة الفعلية",     text:"3 parts: الفعل (the action) · الفاعل (inside or outside doer, always مرفوع) · المفعول (6 types of detail, all منصوب)." },
            { label:"الفعل الماضي",        text:"Only ENDINGS change. 13 forms. Check the ending to identify the inside pronoun." },
            { label:"المفعول — 6 types",   text:"به (who/what) · فيه (when/where) · له (why) · مطلق (emphasis/description/count, same-root مصدر) · الحال (how/state) · متعلق بالفعل (جار ومجرور in جملة فعلية)." },
            { label:"الفعل المضارع",       text:"BOTH beginning (أيتن) and ending change. 3 forms: مرفوع (default) · منصوب/light (4 حروف ناصبة) · مجزوم/lightest (5 حروف جازمة). هن/أنتن NEVER change." },
            { label:"فعل الأمر / النهي",   text:"Commands/forbids: 2nd person only. Built from مضارع. Command: make lightest → remove ت → add helper ألف if needed. Forbid: لَا + 2nd-person lightest. Indirect (3rd): لِـ/لَا + 3rd-person lightest." },
            { label:"نون التوكيد",          text:"نّ added to مضارع/نهي for emphasis. Always future tense. فتحة before نّ = original was ضمة. ضمة before نّ = original had واو. Paired with لام التوكيد for double emphasis." },
            { label:"الفعل المجهول",        text:"Past: u-u-i sound (2nd-to-last = كسرة, others = ضمة, last unchanged). Present: u-a-a sound (first = ضمة, others = فتحة, last unchanged). سكون never changes in either." },
            { label:"نائب الفاعل",          text:"Follows exact same rules as فاعل: comes after فعل, is مرفوع, فعل in هو/هي form, matches gender. Never appears alongside a فاعل." },
            { label:"Transitivity",         text:"لازم (intransitive) = CANNOT take مفعول به → cannot be made passive. متعدٍّ (transitive) = CAN take مفعول به → can be made passive. متعدٍّ لمفعولين = passive keeps one مفعول به + one نائب الفاعل." },
          ].map(r => (
            <div key={r.label} className="recap-row fade-in">
              <div className="recap-row-label">{r.label}</div>
              <div className="recap-row-text">{r.text}</div>
            </div>
          ))}
          <div className="fade-in" style={{ borderTop:"1px solid rgba(201,147,59,.3)",marginTop:"1.5rem",paddingTop:"1rem",textAlign:"center",color:"rgba(255,255,255,.4)",fontStyle:"italic",fontSize:".85rem" }}>
            Next: Chapter 9 — Negation (الجملة الفعلية · الجملة الاسمية · Shared Tools)
          </div>
        </Slide>

      </div>{/* end slides-wrapper */}

      <footer>
        Based on the <a href="#" rel="noopener">Bayyinah Dream Textbook</a> by Sumaya Al-Saadoon
        &nbsp;·&nbsp; Section 1: Nahw · Chapters 6–8
        &nbsp;·&nbsp; الفعل الماضي · المضارع · المجهول
      </footer>

      {showTop && (
        <button className="scroll-top" onClick={() => window.scrollTo({ top:0, behavior:"smooth" })} aria-label="Back to top">↑</button>
      )}
    </>
  );
}
